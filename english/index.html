<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>영문법 암기장</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        :root {
            --md-bg: #FEF7FF;
            --md-on-bg: #1D1B20;
            --md-primary: #6750A4;
            --md-primary-container: #EADDFF;
        }

        body {
            background-color: var(--md-bg);
            color: var(--md-on-bg);
            font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; overflow: hidden;
            -webkit-user-select: none;
        }

        /* iOS 9 호환용 레거시 Flexbox 엔진 */
        .flex-box {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
        }
        .flex-col {
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            -webkit-flex-direction: column;
            flex-direction: column;
        }
        .flex-center {
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
        }
        .flex-1 {
            -webkit-box-flex: 1;
            -webkit-flex: 1;
            flex: 1;
        }

        /* 플로팅 내비게이션 바 디자인 */
        #floating-nav {
            position: fixed; z-index: 9999;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
        }
        .nav-inner {
            background: rgba(234, 221, 255, 0.96);
            border: 1px solid #FFFFFF;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            -webkit-transition: all 0.4s ease;
            transition: all 0.4s ease;
            overflow: hidden;
        }
        .mode-horizontal { width: 280px; height: 85px; border-radius: 40px; }
        .mode-vertical { width: 85px; height: 280px; border-radius: 40px; }
        .minimized { width: 70px !important; height: 70px !important; border-radius: 35px !important; }

        /* 카드 애니메이션 (iOS 9 Safari 전용) */
        .card-container {
            position: relative; width: 100%; height: 180px; margin-bottom: 15px;
            -webkit-perspective: 1000px; perspective: 1000px;
        }
        .card-inner {
            width: 100%; height: 100%;
            -webkit-transition: -webkit-transform 0.6s;
            transition: transform 0.6s;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
        }
        .card-inner.flipped { -webkit-transform: rotateY(180deg); transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 24px; border: 1px solid rgba(0,0,0,0.05);
            background: #FFFFFF;
        }
        .card-back { -webkit-transform: rotateY(180deg); transform: rotateY(180deg); background: #F3E7FF; }

        /* 퀴즈 옵션 버튼 */
        .quiz-opt {
            display: block; width: 100%; padding: 14px 0; margin-bottom: 8px;
            background: #FFF; border-radius: 16px; border: 2px solid transparent;
            font-weight: bold; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            -webkit-appearance: none;
        }
        .quiz-opt.selected { border-color: var(--md-primary); background: var(--md-primary-container); }

        #scroll-area { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>

    <main class="h-screen w-full flex-box flex-col relative overflow-hidden">
        <header class="px-6 pt-10 pb-4">
            <h1 id="page-title" class="text-3xl font-bold">영문법 암기장</h1>
            <p id="page-subtitle" class="text-sm text-gray-500 mt-1">iOS 9 호환성 모드 활성화</p>
        </header>

        <div id="scroll-area" class="flex-1 overflow-y-auto px-4 pb-40">
            <div id="content-container" class="max-w-4xl mx-auto w-full"></div>
        </div>
    </main>

    <!-- 플로팅 메뉴 -->
    <div id="floating-nav" style="left: 50%; top: 90%;">
        <div id="nav-container" class="nav-inner flex-box flex-col mode-horizontal">
            <div id="drag-handle" class="flex-box flex-center" style="width:100%; height:25px;" onclick="if(isMinimized)toggleMinimize()">
                <div style="width:40px; height:4px; background:rgba(0,0,0,0.1); border-radius:2px;"></div>
            </div>
            <div id="nav-items" class="flex-box flex-1" style="width:100%;">
                <button onclick="switchTab('study')" class="flex-1 flex-box flex-col flex-center">
                    <span class="material-symbols-outlined" id="icon-study">menu_book</span>
                    <span style="font-size:10px; font-weight: bold;" id="text-study">학습</span>
                </button>
                <button onclick="switchTab('quiz')" class="flex-1 flex-box flex-col flex-center">
                    <span class="material-symbols-outlined" id="icon-quiz" style="opacity:0.4;">quiz</span>
                    <span style="font-size:10px; opacity:0.4;" id="text-quiz">퀴즈</span>
                </button>
                <button onclick="toggleMinimize(event)" class="flex-1 flex-box flex-col flex-center">
                    <span class="material-symbols-outlined" style="opacity:0.3;">close_fullscreen</span>
                    <span style="font-size:10px; opacity:0.3;">수납</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 이미지 필기 데이터 반영 (where, when, why, how 분리 및 O/X, O 설정)
        var grammarData = [
            { word: 'that', noun: 'O/X', clause: 'X/O', desc: '선행사 유무에 따라 관대/접속사로 쓰임' },
            { word: 'which', noun: 'O', clause: 'X', desc: '사물 선행사 존재, 뒤 문장 불완전' },
            { word: 'what', noun: 'X', clause: 'X', desc: '선행사 포함, 뒤 문장 불완전' },
            { word: 'who', noun: 'O/X', clause: 'X', desc: '사람 선행사 존재, 뒤 문장 불완전' },
            { word: 'where', noun: 'O/X', clause: 'O', desc: '장소 관계부사, 뒤 문장 완전' },
            { word: 'when', noun: 'O/X', clause: 'O', desc: '시간 관계부사, 뒤 문장 완전' },
            { word: 'why', noun: 'O/X', clause: 'O', desc: '이유 관계부사, 뒤 문장 완전' },
            { word: 'how', noun: 'O/X', clause: 'O', desc: '방법 관계부사, 뒤 문장 완전' },
            { word: '전치사 which', noun: 'O', clause: 'O', desc: '전치사와 결합하여 뒤 문장 완전' },
            { word: 'whose', noun: 'O/X', clause: 'O', desc: '소유격 관대, 뒤 문장 완전' }
        ];

        var isMinimized = false;
        var currentSnapMode = 'mode-horizontal';
        var quizQuestions = [], currentIdx = 0, score = 0;
        var selNoun = null, selClause = null;

        function renderStudy() {
            var html = '<div style="padding-top:10px;">';
            for(var i=0; i<grammarData.length; i++){
                var item = grammarData[i];
                html += '<div class="card-container" onclick="this.querySelector(\'.card-inner\').classList.toggle(\'flipped\')">' +
                        '<div class="card-inner">' +
                        '<div class="card-face flex-box flex-col flex-center shadow-sm"><h2 class="text-4xl font-black text-[#6750A4]">'+item.word+'</h2><p style="font-size:10px; margin-top:12px; color:#CCC;">TAB TO FLIP</p></div>' +
                        '<div class="card-face card-back p-6 flex-box flex-col">' +
                        '<div class="flex-box" style="-webkit-box-pack:justify; -webkit-justify-content:space-between; justify-content:space-between; margin-bottom:15px;">' +
                        '<div class="text-center"><p style="font-size:9px; opacity:0.5;">명사</p><b class="text-xl">'+item.noun+'</b></div>' +
                        '<div class="text-center"><b class="text-xl">'+item.word+'</b></div>' +
                        '<div class="text-center"><p style="font-size:9px; opacity:0.5;">완불</p><b class="text-xl">'+item.clause+'</b></div></div>' +
                        '<div style="background:white; padding:12px; border-radius:15px; font-size:13px; text-align:center; flex:1; display:-webkit-box; -webkit-box-align:center; justify-content:center;">'+item.desc+'</div></div>' +
                        '</div></div>';
            }
            document.getElementById('content-container').innerHTML = html + '</div>';
        }

        function startQuiz() {
            quizQuestions = JSON.parse(JSON.stringify(grammarData)).sort(function(){return 0.5-Math.random()});
            currentIdx = 0; score = 0; renderQuizStep();
        }

        function renderQuizStep() {
            var cv = document.getElementById('content-container');
            if(currentIdx >= quizQuestions.length) {
                cv.innerHTML = '<div class="text-center py-20 bg-white rounded-3xl mt-10 shadow-sm"><h2 class="text-2xl font-bold">학습 종료</h2>' +
                               '<p class="text-5xl font-black text-[#6750A4] my-4">'+score+' / '+quizQuestions.length+'</p>' +
                               '<button onclick="startQuiz()" class="mt-4 px-10 py-4 bg-[#6750A4] text-white rounded-full font-bold">다시 도전</button></div>';
                return;
            }
            var q = quizQuestions[currentIdx];
            selNoun = null; selClause = null;
            var html = '<div class="py-4"><div class="bg-white rounded-3xl p-8 text-center mb-6 shadow-sm"><h2 class="text-4xl font-black text-[#6750A4]">'+q.word+'</h2></div>' +
                       '<div class="flex-box" style="margin-bottom:20px;">' +
                       '<div class="flex-1" style="margin-right:10px;"><p class="text-center text-[11px] opacity-40 mb-3 font-bold">명사 유무</p>' +
                       ['O','X','O/X'].map(function(o){return '<button class="quiz-opt" onclick="setNoun(\''+o+'\',this)">'+o+'</button>'}).join('') + '</div>' +
                       '<div class="flex-1"><p class="text-center text-[11px] opacity-40 mb-3 font-bold">문장 완불</p>' +
                       ['O','X','X/O'].map(function(o){return '<button class="quiz-opt" onclick="setClause(\''+o+'\',this)">'+o+'</button>'}).join('') + '</div></div>' +
                       '<button id="sub-btn" class="w-full py-5 rounded-full bg-gray-200 text-gray-400 font-bold" disabled onclick="checkAns()">정답 확인</button></div>';
            cv.innerHTML = html;
        }

        window.setNoun = function(v,el){
            selNoun = v; var b = el.parentNode.getElementsByTagName('button');
            for(var i=0; i<b.length; i++) b[i].className = 'quiz-opt'; el.className = 'quiz-opt selected';
            updateSub();
        }
        window.setClause = function(v,el){
            selClause = v; var b = el.parentNode.getElementsByTagName('button');
            for(var i=0; i<b.length; i++) b[i].className = 'quiz-opt'; el.className = 'quiz-opt selected';
            updateSub();
        }
        function updateSub(){
            var btn = document.getElementById('sub-btn');
            if(selNoun && selClause){ btn.disabled = false; btn.className = 'w-full py-5 rounded-full bg-[#6750A4] text-white font-bold shadow-lg'; }
        }
        window.checkAns = function(){
            var q = quizQuestions[currentIdx];
            var isCor = (selNoun === q.noun && selClause === q.clause);
            if(isCor) score++;
            var cv = document.getElementById('content-container');
            cv.innerHTML = '<div class="py-4"><div class="rounded-3xl p-8 text-center bg-white shadow-sm border-4 '+(isCor?'border-green-200':'border-red-200')+'">' +
                           '<h3 class="text-2xl font-bold mb-4" style="color:'+(isCor?'#386A20':'#B3261E')+'">'+(isCor?'정답입니다!':'오답입니다')+'</h3>' +
                           '<div class="flex-box" style="-webkit-box-pack:center; justify-content:center; margin-bottom:15px;">' +
                           '<div style="margin:0 20px;"><p style="font-size:10px; opacity:0.5;">정답 명사</p><b class="text-2xl">'+q.noun+'</b></div>' +
                           '<div style="margin:0 20px;"><p style="font-size:10px; opacity:0.5;">정답 완불</p><b class="text-2xl">'+q.clause+'</b></div></div>' +
                           '<p class="text-sm opacity-60">'+q.desc+'</p></div>' +
                           '<button onclick="currentIdx++; renderQuizStep();" class="mt-6 w-full py-5 rounded-full bg-[#EADDFF] text-[#21005D] font-bold">다음 문제</button></div>';
        }

        function switchTab(tab) {
            document.getElementById('page-title').innerText = (tab === 'study' ? '영문법 암기장' : '실력 테스트');
            var isS = (tab==='study');
            document.getElementById('icon-study').style.opacity = isS ? '1' : '0.4';
            document.getElementById('text-study').style.opacity = isS ? '1' : '0.4';
            document.getElementById('text-study').style.fontWeight = isS ? 'bold' : 'normal';
            document.getElementById('icon-quiz').style.opacity = isS ? '0.4' : '1';
            document.getElementById('text-quiz').style.opacity = isS ? '0.4' : '1';
            document.getElementById('text-quiz').style.fontWeight = isS ? 'normal' : 'bold';
            if(isS) renderStudy(); else startQuiz();
        }

        function toggleMinimize(e) {
            if(e) e.stopPropagation();
            isMinimized = !isMinimized;
            var c = document.getElementById('nav-container');
            if(isMinimized) {
                c.className = 'nav-inner flex-box flex-col mode-horizontal minimized';
                document.getElementById('nav-items').style.display = 'none';
            } else {
                c.className = 'nav-inner flex-box flex-col ' + currentSnapMode;
                document.getElementById('nav-items').style.display = '-webkit-flex';
                document.getElementById('nav-items').style.display = 'flex';
            }
        }

        window.onload = function() { renderStudy(); };
    </script>
</body>
</html>
