
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>영문법 암기장 PWA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        :root {
            --md-bg: #FEF7FF;
            --md-on-bg: #1D1B20;
            --md-surface: #ECE6F0;
            --md-primary: #6750A4;
            --md-primary-container: #EADDFF;
            --md-on-primary-container: #21005D;
            --md-secondary-container: #E8DEF8;
        }

        body {
            background-color: var(--md-bg);
            color: var(--md-on-bg);
            font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .ease-elastic {
            -webkit-transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .perspective { -webkit-perspective: 1200px; perspective: 1200px; }
        .preserve-3d { -webkit-transform-style: preserve-3d; transform-style: preserve-3d; }
        .backface-hidden { -webkit-backface-visibility: hidden; backface-visibility: hidden; }
        .rotate-y-180 { -webkit-transform: rotateY(180deg); transform: rotateY(180deg); }

        #floating-nav {
            position: fixed;
            z-index: 1000;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-inner {
            background: rgba(234, 221, 255, 0.92);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
            display: flex;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-radius 0.5s ease;
            overflow: hidden;
        }

        .mode-horizontal { flex-direction: column; width: 280px; height: 80px; border-radius: 40px; }
        .mode-horizontal .nav-content { flex-direction: row; }
        .mode-horizontal .drag-area { width: 100%; height: 20px; flex-direction: row; }
        .mode-horizontal .drag-dot { width: 32px; height: 4px; }

        .mode-vertical { flex-direction: row; width: 80px; height: 280px; border-radius: 40px; }
        .mode-vertical .nav-content { flex-direction: column; }
        .mode-vertical .drag-area { width: 20px; height: 100%; flex-direction: column; }
        .mode-vertical .drag-dot { width: 4px; height: 32px; }

        .minimized { width: 70px !important; height: 70px !important; border-radius: 35px !important; }
        .minimized .nav-content { display: none !important; }
        .minimized .drag-area { width: 100% !important; height: 100% !important; border-radius: 35px; cursor: pointer; }
        .minimized .drag-dot { width: 24px !important; height: 24px !important; border-radius: 50%; background: var(--md-primary) !important; opacity: 0.5; }

        .nav-content {
            display: flex;
            flex: 1;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: space-evenly;
            padding: 10px;
        }

        .drag-area {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            flex-shrink: 0;
        }
        .drag-dot { background: rgba(0,0,0,0.15); border-radius: 2px; transition: all 0.3s; }

        .quiz-option {
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .quiz-option.selected {
            background-color: var(--md-primary-container);
            border-color: var(--md-primary);
        }

        @keyframes fadeIn { 
            from { opacity: 0; -webkit-transform: translateY(10px); transform: translateY(10px); } 
            to { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); } 
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                var swCode = "var CACHE_NAME = 'grammar-v3'; var urlsToCache = [ '/', '/index.html' ]; self.addEventListener('install', function(e) { e.waitUntil(caches.open(CACHE_NAME).then(function(c) { return c.addAll(urlsToCache); })); }); self.addEventListener('fetch', function(e) { e.respondWith(caches.match(e.request).then(function(r) { return r || fetch(e.request); })); });";
                var blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }
    </script>

    <main class="h-screen w-full flex flex-col relative overflow-hidden">
        <header class="px-6 pt-10 pb-4">
            <h1 id="page-title" class="text-3xl font-bold text-[var(--md-on-bg)]">영문법 암기장</h1>
            <p id="page-subtitle" class="text-sm text-gray-500 mt-1">이미지 데이터 동기화 완료</p>
        </header>

        <div id="scroll-area" class="flex-1 overflow-y-auto px-4 pb-40" style="-webkit-overflow-scrolling: touch;">
            <div id="content-container" class="max-w-4xl mx-auto w-full"></div>
        </div>
    </main>

    <div id="floating-nav" class="ease-elastic" style="left: 50%; top: 90%;">
        <div id="nav-container" class="nav-inner mode-horizontal">
            <div id="drag-handle" class="drag-area" onclick="handleContainerClick()">
                <div class="drag-dot"></div>
            </div>
            
            <div class="nav-content">
                <button id="btn-study" onclick="switchTab('study')" class="flex-1 flex flex-col items-center justify-center gap-1 group">
                    <span class="material-symbols-outlined text-2xl transition-transform group-active:scale-125">menu_book</span>
                    <span class="text-[10px] font-bold">학습</span>
                </button>
                
                <button id="btn-quiz" onclick="switchTab('quiz')" class="flex-1 flex flex-col items-center justify-center gap-1 group">
                    <span class="material-symbols-outlined text-2xl text-gray-400 transition-transform group-active:scale-125">quiz</span>
                    <span class="text-[10px] font-medium text-gray-400">퀴즈</span>
                </button>
                
                <button onclick="toggleMinimize(event)" class="flex-1 flex flex-col items-center justify-center group">
                    <span class="material-symbols-outlined text-2xl opacity-40">close_fullscreen</span>
                    <span class="text-[10px] font-medium opacity-40">수납</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 업로드된 이미지 데이터를 기반으로 정밀 매핑
        var grammarData = [
            { id: 1, word: 'that', noun: 'O/X', clause: 'X/O', desc: '선행사가 있을 수도 없을 수도 있으며, 뒤 문장은 불완전하거나 완전할 수 있음' },
            { id: 2, word: 'which', noun: 'O', clause: 'X', desc: '선행사(사물)가 반드시 있고, 뒤 문장은 불완전함' },
            { id: 3, word: 'what', noun: 'X', clause: 'X', desc: '선행사가 없으며, 뒤 문장도 불완전함' },
            { id: 4, word: 'who', noun: 'O/X', clause: 'X', desc: '선행사(사람)가 있거나 없을 수 있으며, 뒤 문장은 불완전함' },
            { id: 5, word: 'where', noun: 'O/X', clause: 'O', desc: '장소 선행사가 있거나 없을 수 있으며, 뒤 문장은 완전함' },
            { id: 6, word: 'when', noun: 'O/X', clause: 'O', desc: '시간 선행사가 있거나 없을 수 있으며, 뒤 문장은 완전함' },
            { id: 7, word: 'why', noun: 'O/X', clause: 'O', desc: '이유 선행사가 있거나 없을 수 있으며, 뒤 문장은 완전함' },
            { id: 8, word: 'how', noun: 'O/X', clause: 'O', desc: '방법 선행사가 있거나 없을 수 있으며, 뒤 문장은 완전함' },
            { id: 9, word: '전치사 which', noun: 'O', clause: 'O', desc: '선행사가 있으며, 전치사 결합으로 뒤 문장은 완전함' },
            { id: 10, word: 'whose', noun: 'O/X', clause: 'O', desc: '소유격 관계대명사, 선행사 유무와 관계없이 뒤 문장은 완전해 보임' }
        ];

        var currentTab = 'study';
        var isMinimized = false;
        var isDragging = false;
        var startX, startY, initialX, initialY;
        var currentSnapMode = 'mode-horizontal';

        var quizQuestions = [];
        var currentQuizIdx = 0;
        var quizScore = 0;
        var selectedNoun = null;
        var selectedClause = null;
        var isShowingResult = false;

        var nav = document.getElementById('floating-nav');
        var container = document.getElementById('nav-container');
        var handle = document.getElementById('drag-handle');

        function onStart(e) {
            isDragging = true;
            nav.classList.remove('ease-elastic');
            var pt = e.touches ? e.touches[0] : e;
            startX = pt.clientX; startY = pt.clientY;
            var rect = nav.getBoundingClientRect();
            initialX = rect.left + rect.width / 2; initialY = rect.top + rect.height / 2;
        }

        function onMove(e) {
            if (!isDragging) return;
            var pt = e.touches ? e.touches[0] : e;
            var dx = pt.clientX - startX; var dy = pt.clientY - startY;
            nav.style.left = (initialX + dx) + 'px'; nav.style.top = (initialY + dy) + 'px';
            if (e.preventDefault) e.preventDefault();
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            nav.classList.add('ease-elastic');
            var w = window.innerWidth, h = window.innerHeight;
            var rect = nav.getBoundingClientRect();
            var curX = rect.left + rect.width / 2, curY = rect.top + rect.height / 2;
            var m = 75;
            var points = [
                {x: w/2, y: h-m, mode: 'mode-horizontal'},
                {x: w/2, y: m, mode: 'mode-horizontal'},
                {x: m-20, y: h/2, mode: 'mode-vertical'},
                {x: w-m+20, y: h/2, mode: 'mode-vertical'}
            ];
            var closest = points[0], minD = 999999;
            for(var i=0; i<points.length; i++){
                var d = Math.sqrt(Math.pow(points[i].x-curX,2)+Math.pow(points[i].y-curY,2));
                if(d < minD){ minD = d; closest = points[i]; }
            }
            currentSnapMode = closest.mode;
            if(!isMinimized) container.className = 'nav-inner ' + currentSnapMode;
            nav.style.left = closest.x + 'px'; nav.style.top = closest.y + 'px';
        }

        handle.addEventListener('mousedown', onStart);
        handle.addEventListener('touchstart', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove);
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);

        function handleContainerClick() { if (isMinimized) toggleMinimize(); }

        function toggleMinimize(e) {
            if (e) e.stopPropagation();
            isMinimized = !isMinimized;
            if (isMinimized) container.classList.add('minimized');
            else container.className = 'nav-inner ' + currentSnapMode;
        }

        function renderStudy() {
            var containerView = document.getElementById('content-container');
            var html = '<div class="animate-fadeIn" style="padding-top:20px;">';
            for(var i=0; i<grammarData.length; i++) {
                var item = grammarData[i];
                html += '<div class="perspective mb-4" style="height:200px;" onclick="this.querySelector(\'.preserve-3d\').classList.toggle(\'rotate-y-180\')">' +
                        '<div class="preserve-3d relative w-full h-full ease-elastic shadow-md rounded-[32px]">' +
                        '<div class="absolute w-full h-full backface-hidden rounded-[32px] bg-white border border-gray-100 flex flex-col items-center justify-center p-6">' +
                        '<h2 class="text-3xl font-bold text-[var(--md-primary)]">' + item.word + '</h2>' +
                        '<p class="mt-2 text-[10px] opacity-20 uppercase tracking-tighter italic">Tap to flip</p></div>' +
                        '<div class="absolute w-full h-full backface-hidden rotate-y-180 rounded-[32px] bg-[var(--md-primary-container)] p-6 flex flex-col">' +
                        '<div class="flex justify-between items-center mb-2 text-center"><div><p class="text-[9px] opacity-40">명사</p><b>' + item.noun + '</b></div>' +
                        '<div><b class="text-lg">' + item.word + '</b></div>' +
                        '<div><p class="text-[9px] opacity-40">완불</p><b>' + item.clause + '</b></div></div>' +
                        '<div class="flex-1 bg-white/40 rounded-2xl p-3 text-center flex items-center justify-center">' +
                        '<p class="text-[13px] font-medium leading-tight">' + item.desc + '</p></div></div>' +
                        '</div></div>';
            }
            html += '</div>';
            containerView.innerHTML = html;
        }

        function startQuiz() {
            quizQuestions = JSON.parse(JSON.stringify(grammarData)).sort(function() { return 0.5 - Math.random(); });
            currentQuizIdx = 0; quizScore = 0;
            renderQuizStep();
        }

        function renderQuizStep() {
            var containerView = document.getElementById('content-container');
            if (currentQuizIdx >= quizQuestions.length) {
                containerView.innerHTML = '<div class="animate-fadeIn text-center py-16 bg-[var(--md-secondary-container)] rounded-[40px]">' +
                    '<h2 class="text-2xl font-bold mb-4">학습 결과</h2>' +
                    '<p class="text-6xl font-black text-[var(--md-primary)]">' + quizScore + '/' + quizQuestions.length + '</p>' +
                    '<button onclick="startQuiz()" class="mt-8 px-12 py-4 bg-[var(--md-primary)] text-white rounded-full font-bold active:scale-95 transition-transform">다시 풀기</button>' +
                    '</div>';
                return;
            }
            var q = quizQuestions[currentQuizIdx];
            selectedNoun = null; selectedClause = null; isShowingResult = false;
            var html = '<div class="animate-fadeIn py-4">' +
                '<div class="bg-white rounded-[40px] p-8 shadow-sm text-center mb-6">' +
                '<h2 class="text-4xl font-bold text-[var(--md-primary)]">' + q.word + '</h2>' +
                '</div>' +
                '<div class="grid grid-cols-2 gap-4 mb-6">' +
                '<div class="flex flex-col gap-2"> <p class="text-center text-[10px] font-bold opacity-30">명사 유무</p>' +
                ['O', 'X', 'O/X'].map(function(opt){ return '<button onclick="setNoun(\''+opt+'\', this)" class="quiz-option py-4 bg-white rounded-2xl font-bold shadow-sm">'+opt+'</button>'; }).join('') +
                '</div>' +
                '<div class="flex flex-col gap-2"> <p class="text-center text-[10px] font-bold opacity-30">문장 완불</p>' +
                ['O', 'X', 'X/O'].map(function(opt){ return '<button onclick="setClause(\''+opt+'\', this)" class="quiz-option py-4 bg-white rounded-2xl font-bold shadow-sm">'+opt+'</button>'; }).join('') +
                '</div>' +
                '</div>' +
                '<button id="submit-quiz" onclick="checkAnswer()" class="w-full py-5 rounded-full bg-gray-200 text-gray-400 font-bold cursor-not-allowed">제출</button>' +
                '</div>';
            containerView.innerHTML = html;
        }

        window.setNoun = function(v, el) { 
            selectedNoun = v; 
            var b = el.parentNode.querySelectorAll('.quiz-option'); for(var i=0; i<b.length; i++) b[i].classList.remove('selected'); 
            el.classList.add('selected'); updateBtn(); 
        };
        window.setClause = function(v, el) { 
            selectedClause = v; 
            var b = el.parentNode.querySelectorAll('.quiz-option'); for(var i=0; i<b.length; i++) b[i].classList.remove('selected'); 
            el.classList.add('selected'); updateBtn(); 
        };
        function updateBtn() {
            var btn = document.getElementById('submit-quiz');
            if(selectedNoun && selectedClause) { btn.className = 'w-full py-5 rounded-full bg-[var(--md-primary)] text-white font-bold shadow-md active:scale-95'; btn.style.cursor = 'pointer'; }
        }

        window.checkAnswer = function() {
            if(!selectedNoun || !selectedClause || isShowingResult) return;
            isShowingResult = true;
            var q = quizQuestions[currentQuizIdx];
            var isCorrect = (selectedNoun === q.noun && selectedClause === q.clause);
            if(isCorrect) quizScore++;
            var cv = document.getElementById('content-container');
            cv.innerHTML = '<div class="animate-fadeIn py-4">' +
                '<div class="rounded-[40px] overflow-hidden border-4 ' + (isCorrect ? 'border-green-200' : 'border-red-200') + '">' +
                '<div class="p-6 ' + (isCorrect ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600') + ' text-center">' +
                '<h3 class="text-xl font-bold">' + (isCorrect ? '정답입니다' : '오답입니다') + '</h3>' +
                '</div>' +
                '<div class="bg-white p-8">' +
                '<div class="flex justify-around mb-4"><div><p class="text-[10px]">명사</p><b>' + q.noun + '</b></div>' +
                '<div><b class="text-2xl">' + q.word + '</b></div>' +
                '<div><p class="text-[10px]">완불</p><b>' + q.clause + '</b></div></div>' +
                '</div></div>' +
                '<button onclick="currentQuizIdx++; renderQuizStep();" class="mt-4 w-full py-5 rounded-full bg-[var(--md-primary-container)] font-bold">다음 문제</button>' +
                '</div>';
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('page-title').innerText = (tab === 'study' ? '문법 암기장' : '실력 테스트');
            var s = document.getElementById('btn-study'), q = document.getElementById('btn-quiz');
            if(tab === 'study') {
                s.querySelector('span:first-child').className = 'material-symbols-outlined text-2xl';
                s.querySelector('span:last-child').className = 'text-[10px] font-bold';
                q.querySelector('span:first-child').className = 'material-symbols-outlined text-2xl text-gray-400';
                q.querySelector('span:last-child').className = 'text-[10px] font-medium text-gray-400';
                renderStudy();
            } else {
                q.querySelector('span:first-child').className = 'material-symbols-outlined text-2xl';
                q.querySelector('span:last-child').className = 'text-[10px] font-bold';
                s.querySelector('span:first-child').className = 'material-symbols-outlined text-2xl text-gray-400';
                s.querySelector('span:last-child').className = 'text-[10px] font-medium text-gray-400';
                startQuiz();
            }
        }
        window.onload = function() { switchTab('study'); };
    </script>
</body>
</html>
