
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soap Bubble Study Timer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .timer-display {
            font-size: 160px;
            font-weight: 900;
            color: #000000;
            line-height: 1;
        }

        .mode-label {
            font-size: 20px;
            font-weight: bold;
            color: #cccccc;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }

        .controls {
            position: absolute;
            bottom: 40px;
            z-index: 20;
            width: 100%;
            text-align: center;
            pointer-events: auto;
        }

        button {
            background: #ffffff;
            border: 4px solid #000000;
            color: #000000;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 40px;
            margin: 0 5px;
            cursor: pointer;
            -webkit-appearance: none;
        }

        button:active {
            background: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div id="app-container">
    <canvas id="bubbleCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="mode-label" id="modeLabel">STUDY</div>
        <div class="timer-display" id="timeDisplay">20:00</div>
    </div>

    <div class="controls">
        <button id="startBtn">START</button>
        <button id="resetBtn">RESET</button>
        <button id="switchBtn">SWITCH</button>
    </div>
</div>

<script>
    var canvas = document.getElementById('bubbleCanvas');
    var ctx = canvas.getContext('2d');
    var timeDisplay = document.getElementById('timeDisplay');
    var modeLabel = document.getElementById('modeLabel');
    
    var timer = null;
    var isRunning = false;
    var mode = 'study'; 
    var timeLeft = 20 * 60;
    
    var bubbles = [];
    var targetCount = 1200;

    function init() {
        resize();
        window.addEventListener('resize', resize);
        resetTimer();
        animate();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createBubble() {
        var r = Math.random() * 14 + 7;
        return {
            x: Math.random() * (canvas.width - r * 2) + r,
            y: canvas.height + r + 50,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -(Math.random() * 1.2 + 0.8),
            r: r,
            color: 'hsla(' + (Math.random() * 360) + ', 70%, 80%, 0.4)',
            isSettled: false
        };
    }

    function updateBubbles() {
        // 비눗방울 점진적 보충
        if (bubbles.length < targetCount) {
            for(var i=0; i<3; i++) {
                if(bubbles.length < targetCount) bubbles.push(createBubble());
            }
        }

        for (var i = 0; i < bubbles.length; i++) {
            var b = bubbles[i];

            // 항상 약한 부력 적용 (빈 공간으로 이동 유도)
            if (b.isSettled) {
                b.vy = -0.2; // 고정된 상태에서도 살짝 위로 힘을 줌
                b.isSettled = false; // 매 프레임 충돌 검사를 위해 일단 해제
            }

            b.x += b.vx;
            b.y += b.vy;

            // 공기 저항
            b.vx *= 0.98;
            b.vy *= 0.98;
            if (b.vy > -0.5) b.vy -= 0.05; // 최소 상승 속도 유지

            // 벽 충돌 (양옆)
            if (b.x - b.r < 0) { b.x = b.r; b.vx *= -0.3; }
            if (b.x + b.r > canvas.width) { b.x = canvas.width - b.r; b.vx *= -0.3; }

            // 위쪽 끝에 닿으면 멈춤
            if (b.y - b.r < 0) {
                b.y = b.r;
                b.isSettled = true;
                b.vy = 0;
                b.vx = 0;
            }

            // 충돌 로직
            for (var j = 0; j < bubbles.length; j++) {
                if (i === j) continue;
                var b2 = bubbles[j];
                
                var dx = b2.x - b.x;
                var dy = b2.y - b.y;
                var distSq = dx * dx + dy * dy;
                var minDist = b.r + b2.r;

                if (distSq < minDist * minDist) {
                    var dist = Math.sqrt(distSq) || 0.1;
                    var angle = Math.atan2(dy, dx);
                    var overlap = (minDist - dist) * 0.7; // 밀어내는 정도
                    
                    var moveX = Math.cos(angle) * overlap;
                    var moveY = Math.sin(angle) * overlap;

                    b.x -= moveX * 0.5;
                    b.y -= moveY * 0.5;
                    b2.x += moveX * 0.5;
                    b2.y += moveY * 0.5;

                    // 위쪽 버블에 닿으면 상승 정지
                    if (b.y > b2.y && b2.isSettled) {
                        b.isSettled = true;
                        b.vy = 0;
                    }
                    if (b2.y > b.y && b.isSettled) {
                        b2.isSettled = true;
                        b2.vy = 0;
                    }
                }
            }
        }
    }

    function drawBubbles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (var i = 0; i < bubbles.length; i++) {
            var b = bubbles[i];
            
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            
            // 하이라이트
            ctx.beginPath();
            ctx.arc(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();

            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }

    function popOneBubble() {
        if (bubbles.length > 0) {
            targetCount--; 
            
            // 최상단 고정된 버블 찾기
            var foundIndex = -1;
            var minY = canvas.height;

            for(var i=0; i<bubbles.length; i++) {
                if(bubbles[i].isSettled && bubbles[i].y < minY) {
                    minY = bubbles[i].y;
                    foundIndex = i;
                }
            }

            if (foundIndex === -1) foundIndex = 0;

            bubbles.splice(foundIndex, 1);
            
            // 터진 곳 주변 버블들의 고정 상태를 해제하여 위로 이동 유도
            for(var j=0; j<bubbles.length; j++) {
                bubbles[j].isSettled = false;
            }
        }
    }

    function animate() {
        updateBubbles();
        drawBubbles();
        requestAnimationFrame(animate);
    }

    function updateDisplay() {
        var mins = Math.floor(timeLeft / 60);
        var secs = timeLeft % 60;
        timeDisplay.innerHTML = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById('startBtn').innerHTML = 'PAUSE';
        
        timer = setInterval(function() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
                popOneBubble(); 
            } else {
                clearInterval(timer);
                isRunning = false;
                alert("TIME UP!");
                switchMode();
            }
        }, 1000);
    }

    function pauseTimer() {
        isRunning = false;
        clearInterval(timer);
        document.getElementById('startBtn').innerHTML = 'RESUME';
    }

    function resetTimer() {
        pauseTimer();
        timeLeft = (mode === 'study') ? 20 * 60 : 5 * 60;
        targetCount = (mode === 'study') ? 1200 : 300;
        bubbles = [];
        document.getElementById('startBtn').innerHTML = 'START';
        updateDisplay();
    }

    function switchMode() {
        mode = (mode === 'study') ? 'break' : 'study';
        modeLabel.innerHTML = (mode === 'study') ? 'STUDY' : 'BREAK';
        resetTimer();
    }

    document.getElementById('startBtn').onclick = function() {
        if (isRunning) pauseTimer();
        else startTimer();
    };
    document.getElementById('resetBtn').onclick = resetTimer;
    document.getElementById('switchBtn').onclick = switchMode;

    init();

    window.requestAnimationFrame = window.requestAnimationFrame || 
                                   window.webkitRequestAnimationFrame || 
                                   function(callback) { return setTimeout(callback, 1000/60); };
</script>
</body>
</html>
