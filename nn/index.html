```html
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DURU - 고촌고 1학년 8반</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase (데이터 저장을 위한 준비) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #E5E9F0; color: #1E293B; }
    
    /* 물리적 버튼 및 패널 디자인 CSS */
    .tactile-plate {
      background: linear-gradient(145deg, #EEF2F6, #D8DFE8);
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      box-shadow: 8px 10px 24px rgba(163, 177, 198, 0.55), -8px -8px 24px rgba(255, 255, 255, 0.95), inset 1px 1px 2px rgba(255, 255, 255, 0.9);
      border-radius: 24px;
    }
    .debossed-well {
      background: #E2E8F0;
      border-radius: 16px;
      box-shadow: inset 3.5px 3.5px 8px rgba(163, 177, 198, 0.8), inset -3.5px -3.5px 8px rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }
    .tactile-pill-btn {
      background: linear-gradient(180deg, #F1F5F9 0%, #D8DFE8 100%);
      border: 2px solid #CBD5E1; outline: 1px solid #F1F5F9; 
      box-shadow: inset 0px 2px 4px rgba(0,0,0,0.1), inset 0px -2px 4px rgba(255,255,255,0.9), 0px 4px 8px rgba(148,163,184,0.5); 
      border-radius: 999px; transition: all 0.1s; cursor: pointer; font-weight: 800;
    }
    .tactile-pill-btn:active {
      transform: translateY(2px);
      box-shadow: inset 0px 4px 8px rgba(0,0,0,0.2), inset 0px -1px 2px rgba(255,255,255,0.4), 0px 1px 2px rgba(255,255,255,0.5);
    }
    .tactile-pill-btn-primary {
      background: linear-gradient(180deg, #93C5FD 0%, #2563EB 100%);
      border: 2px solid #1D4ED8; outline: 1px solid #93C5FD; color: white;
      box-shadow: inset 0px 2px 4px rgba(0,0,0,0.15), inset 0px -2px 4px rgba(255,255,255,0.4), 0px 4px 8px rgba(37,99,235,0.4); 
      border-radius: 999px; transition: all 0.1s; cursor: pointer; font-weight: 800;
    }
    .tactile-pill-btn-primary:active {
      transform: translateY(2px);
      box-shadow: inset 0px 4px 8px rgba(0,0,0,0.3), inset 0px -1px 2px rgba(255,255,255,0.2), 0px 1px 2px rgba(255,255,255,0.2);
    }
    .timetable-cell {
      transition: all 0.2s;
    }
    .timetable-cell:hover { transform: scale(1.05); z-index: 10; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 아이콘 세트
    const Icons = {
      Notice: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Calendar: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Clock: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Meal: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>,
      Archive: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
      Tester: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 9.36l-7.1 7.1a1 1 0 0 1-1.4 0l-2.8-2.8a1 1 0 0 1 0-1.4l7.1-7.1a6 6 0 0 1 9.36-7.94l-3.6 3.6z"/></svg>,
      Plus: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    };

    // --- 고촌고등학교 실제 NEIS API 세팅 ---
    const NEIS_URL = 'https://open.neis.go.kr/hub';
    const ATPT_CODE = 'J10';        // 경기도교육청
    const SCHUL_CODE = '7531479';   // 고촌고등학교 진짜 코드
    const NEIS_API_KEY = '4b9aa5aa974e4963ab8714cfb9850e41'; // 전달해주신 인증 키

    // 브라우저 CORS 에러 차단 우회를 위한 프록시 주소 (모든 통신을 강제로 연결)
    const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

    function App() {
      // 라우팅 상태 (tester 확인 포함)
      const urlParams = new URLSearchParams(window.location.search);
      const isTesterMode = urlParams.get('tester') === 'true' || window.location.pathname.includes('/tester');
      const [activeTab, setActiveTab] = useState(isTesterMode ? 'tester' : 'notice');

      // 브라우저 알림 권한
      useEffect(() => {
        if ('Notification' in window && Notification.permission !== 'granted') {
          Notification.requestPermission();
        }
      }, []);

      // 스마트 알림 엔진 (1분에 한 번씩 시간 체크)
      useEffect(() => {
        const checkTimeAndNotify = () => {
          const now = new Date();
          const hours = now.getHours();
          const mins = now.getMinutes();
          const timeStr = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;

          if (Notification.permission !== 'granted') return;

          if (timeStr === '08:40') {
            new Notification('DURU 아침 알림', { body: '오늘 하루도 화이팅! 1학년 8반 일정을 확인해보세요.' });
          } else if (timeStr === '12:35') {
            new Notification('DURU 급식 알림', { body: '점심시간입니다! 오늘의 급식 메뉴를 확인하세요 🍚' });
          } else if (['09:55', '10:55', '11:55', '13:45', '14:45', '15:45'].includes(timeStr)) {
            new Notification('DURU 수업 알림', { body: '곧 다음 교시가 시작됩니다. 과목 메모를 확인하세요 📖' });
          }
        };

        const timer = setInterval(checkTimeAndNotify, 60000);
        return () => clearInterval(timer);
      }, []);

      return (
        <div className="flex flex-col md:flex-row h-screen bg-[#E5E9F0] p-2 md:p-6 gap-4">
          {/* 사이드바 네비게이션 */}
          <nav className="tactile-plate p-4 md:w-64 flex md:flex-col gap-3 shrink-0 overflow-x-auto md:overflow-visible z-20">
            <div className="hidden md:flex items-center gap-3 mb-6 px-2">
              <div className="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-black text-xl shadow-inner">D</div>
              <div>
                <h1 className="font-black text-xl text-slate-800">DURU</h1>
                <p className="text-[10px] font-bold text-slate-500">고촌고 1학년 8반</p>
              </div>
            </div>

            {[
              { id: 'notice', label: '학급 알림', icon: Icons.Notice },
              { id: 'calendar', label: '학급 일정', icon: Icons.Calendar },
              { id: 'timetable', label: '연동 시간표', icon: Icons.Clock },
              { id: 'meal', label: '연동 급식', icon: Icons.Meal },
              { id: 'archive', label: '자료 보관함', icon: Icons.Archive },
              { id: 'tester', label: 'Tester', icon: Icons.Tester }
            ].map(tab => (
              <button 
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`flex items-center gap-3 p-3 rounded-xl font-bold transition-all shrink-0 ${activeTab === tab.id ? 'tactile-pill-btn-primary' : 'tactile-pill-btn'}`}
              >
                <tab.icon />
                <span className="hidden md:block text-sm">{tab.label}</span>
              </button>
            ))}
          </nav>

          {/* 메인 뷰 영역 */}
          <main className="flex-1 tactile-plate flex flex-col overflow-hidden relative border border-white/60">
            {activeTab === 'notice' && <NoticeBoard />}
            {activeTab === 'calendar' && <CalendarView />}
            {activeTab === 'timetable' && <TimetableView />}
            {activeTab === 'meal' && <MealView />}
            {activeTab === 'archive' && <ArchiveView />}
            {activeTab === 'tester' && <TesterView />}
          </main>
        </div>
      );
    }

    // ==========================================
    // 1. 학급 알림 (게시판 + 이미지 업로드 기능)
    // ==========================================
    function NoticeBoard() {
      const [posts, setPosts] = useState(() => JSON.parse(localStorage.getItem('duru_notices')) || []);
      const [isWriting, setIsWriting] = useState(false);
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const [image, setImage] = useState(null);

      const savePosts = (newPosts) => {
        setPosts(newPosts);
        localStorage.setItem('duru_notices', JSON.stringify(newPosts));
      };

      const handleImage = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setImage(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = () => {
        if (!title.trim() || !content.trim()) return;
        const newPost = { id: Date.now(), title, content, image, date: new Date().toLocaleDateString() };
        savePosts([newPost, ...posts]);
        setIsWriting(false); setTitle(''); setContent(''); setImage(null);
      };

      return (
        <div className="p-6 flex flex-col h-full">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><Icons.Notice /> 학급 알림</h2>
            <button onClick={() => setIsWriting(!isWriting)} className="tactile-pill-btn-primary px-4 py-2 text-xs flex items-center gap-1">
              <Icons.Plus /> 글쓰기
            </button>
          </div>

          {isWriting && (
            <div className="debossed-well p-4 mb-6 flex flex-col gap-3">
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="제목 (예: 1학기 중간고사 시험 범위)" className="bg-transparent font-black text-lg outline-none w-full" />
              <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="내용을 입력하세요..." className="bg-transparent text-sm font-semibold outline-none w-full h-24 resize-none"></textarea>
              <input type="file" accept="image/*" onChange={handleImage} className="text-xs font-bold text-slate-500" />
              {image && <img src={image} className="h-32 object-contain rounded-xl" />}
              <div className="flex justify-end gap-2">
                <button onClick={() => setIsWriting(false)} className="tactile-pill-btn py-2 px-4 text-xs">취소</button>
                <button onClick={handleSubmit} className="tactile-pill-btn-primary py-2 px-4 text-xs">등록</button>
              </div>
            </div>
          )}

          <div className="flex-1 overflow-y-auto pr-2 flex flex-col gap-4">
            {posts.length === 0 ? <p className="text-center text-slate-500 font-bold mt-10">등록된 알림이 없습니다.</p> : null}
            {posts.map(post => (
              <div key={post.id} className="tactile-card p-5 relative group">
                <h3 className="font-black text-lg text-slate-800">{post.title}</h3>
                <p className="text-xs text-slate-500 font-bold mb-3">{post.date}</p>
                <p className="text-sm font-semibold text-slate-700 whitespace-pre-wrap">{post.content}</p>
                {post.image && <img src={post.image} className="mt-4 max-h-60 rounded-xl border border-slate-200 shadow-sm" />}
                <button onClick={() => savePosts(posts.filter(p => p.id !== post.id))} className="absolute top-4 right-4 tactile-pill-btn p-2 opacity-0 group-hover:opacity-100 !text-red-500">
                  <Icons.Trash />
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 학급 일정 (D-Day 및 달력)
    // ==========================================
    function CalendarView() {
      const [events, setEvents] = useState(() => JSON.parse(localStorage.getItem('duru_events')) || []);
      const [title, setTitle] = useState('');
      const [date, setDate] = useState('');

      const saveEvents = (newEvents) => {
        setEvents(newEvents.sort((a,b) => new Date(a.date) - new Date(b.date)));
        localStorage.setItem('duru_events', JSON.stringify(newEvents));
      };

      const handleAdd = () => {
        if(!title || !date) return;
        saveEvents([...events, { id: Date.now(), title, date }]);
        setTitle(''); setDate('');
      };

      const calcDday = (targetDate) => {
        const today = new Date();
        today.setHours(0,0,0,0);
        const target = new Date(targetDate);
        const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        if(diff === 0) return 'D-Day';
        return diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
      };

      return (
        <div className="p-6 flex flex-col h-full">
          <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2 mb-6"><Icons.Calendar /> 학급 일정 & D-Day</h2>
          
          <div className="debossed-well p-3 flex gap-2 mb-6">
            <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="일정 (예: 체육대회)" className="bg-transparent flex-1 font-bold text-sm outline-none px-2" />
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="bg-transparent font-bold text-sm outline-none px-2 text-slate-600" />
            <button onClick={handleAdd} className="tactile-pill-btn-primary px-4 py-2 text-xs">추가</button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto">
            {events.map(ev => {
              const dday = calcDday(ev.date);
              const isClose = dday.startsWith('D-') && parseInt(dday.substring(2)) <= 7;
              return (
                <div key={ev.id} className="tactile-card p-4 flex justify-between items-center group">
                  <div>
                    <h3 className="font-black text-slate-800">{ev.title}</h3>
                    <p className="text-xs font-bold text-slate-500">{ev.date}</p>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className={`text-xl font-black ${isClose ? 'text-red-500' : 'text-blue-600'}`}>{dday}</span>
                    <button onClick={() => saveEvents(events.filter(e => e.id !== ev.id))} className="tactile-pill-btn p-1.5 opacity-0 group-hover:opacity-100 !text-red-500"><Icons.Trash /></button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. 연동 시간표 (NEIS API 진짜 연동 + CORS Proxy)
    // ==========================================
    function TimetableView() {
      const defaultTable = Array(7).fill().map(() => Array(5).fill({ subject: '로딩중..', memo: '' }));
      const [table, setTable] = useState(() => JSON.parse(localStorage.getItem('duru_timetable')) || defaultTable);
      const [selectedSlot, setSelectedSlot] = useState(null);
      const [memoText, setMemoText] = useState('');
      const [fetchStatus, setFetchStatus] = useState(''); // 상태 메시지 표시
      const days = ['월', '화', '수', '목', '금'];

      const getWeekRange = () => {
        const today = new Date();
        const d = today.getDay() || 7; 
        const mon = new Date(today); mon.setDate(today.getDate() - d + 1);
        const fri = new Date(today); fri.setDate(today.getDate() - d + 5);

        const formatYMD = (date) => `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
        return { start: formatYMD(mon), end: formatYMD(fri) };
      };

      useEffect(() => {
        const fetchTimetable = async () => {
          try {
            const { start, end } = getWeekRange();
            const apiUrl = `${NEIS_URL}/hisTimetable?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&GRADE=1&CLASS_NM=8&TI_FROM_YMD=${start}&TI_TO_YMD=${end}`;
            
            // CORS 에러 방지를 위해 프록시 서버 경유
            const res = await fetch(CORS_PROXY + encodeURIComponent(apiUrl));
            const data = await res.json();

            const existingTable = JSON.parse(localStorage.getItem('duru_timetable')) || Array(7).fill().map(() => Array(5).fill({ subject: '-', memo: '' }));
            const newTable = Array(7).fill().map(() => Array(5).fill({ subject: '-', memo: '' }));

            if(data.hisTimetable) {
              const rows = data.hisTimetable[1].row;
              rows.forEach(item => {
                const dateStr = item.ALL_TI_YMD;
                const y = parseInt(dateStr.substring(0,4));
                const m = parseInt(dateStr.substring(4,6)) - 1;
                const d = parseInt(dateStr.substring(6,8));
                
                const dateObj = new Date(y, m, d);
                const dayIdx = dateObj.getDay() - 1; 
                const periodIdx = parseInt(item.PERIO) - 1; 

                if(dayIdx >= 0 && dayIdx < 5 && periodIdx >= 0 && periodIdx < 7) {
                  const cleanSubject = item.ITRT_CNTNT.replace(/[^가-힣a-zA-Z]/g, ''); 
                  const savedMemo = existingTable[periodIdx]?.[dayIdx]?.memo || '';
                  newTable[periodIdx][dayIdx] = { subject: cleanSubject, memo: savedMemo };
                }
              });
              setTable(newTable);
              localStorage.setItem('duru_timetable', JSON.stringify(newTable));
              setFetchStatus('');
            } else if (data.RESULT && data.RESULT.CODE === 'INFO-200') {
              setFetchStatus('학교에서 이번 주 시간표를 나이스 서버에 올리지 않았습니다.');
              setTable(existingTable); 
            } else {
              setTable(existingTable);
            }
          } catch (e) {
            console.error('시간표 가져오기 실패:', e);
            setFetchStatus('네트워크 환경 때문에 나이스 서버 통신에 실패했습니다.');
            const existingTable = JSON.parse(localStorage.getItem('duru_timetable')) || Array(7).fill().map(() => Array(5).fill({ subject: '-', memo: '' }));
            setTable(existingTable);
          }
        };

        fetchTimetable();
      }, []);

      const handleSaveMemo = () => {
        if(!selectedSlot) return;
        const newTable = [...table];
        newTable[selectedSlot.row][selectedSlot.col].memo = memoText;
        setTable(newTable);
        localStorage.setItem('duru_timetable', JSON.stringify(newTable));
        setSelectedSlot(null);
      };

      return (
        <div className="p-6 flex flex-col h-full">
          <div className="flex justify-between items-end mb-6">
            <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><Icons.Clock /> 연동 시간표</h2>
            {fetchStatus && <span className="text-[10px] font-bold text-red-500 bg-red-100 px-2 py-1 rounded-md">{fetchStatus}</span>}
          </div>
          
          <div className="flex-1 overflow-auto bg-[#EAF0F6] rounded-2xl p-4 border border-white/60 shadow-inner relative">
            <div className="grid grid-cols-5 gap-2 h-full min-w-[500px]">
              {days.map(day => <div key={day} className="text-center font-black text-slate-500 mb-2">{day}</div>)}
              {table.map((row, rIdx) => 
                row.map((cell, cIdx) => (
                  <div key={`${rIdx}-${cIdx}`} 
                       onClick={() => { setSelectedSlot({row: rIdx, col: cIdx, cell }); setMemoText(cell.memo); }}
                       className="tactile-pill-btn rounded-xl flex flex-col items-center justify-center p-2 relative h-16 sm:h-20 timetable-cell">
                    <span className="font-black text-sm text-slate-800">{cell.subject}</span>
                    {cell.memo && <div className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse shadow-sm"></div>}
                  </div>
                ))
              )}
            </div>
          </div>

          {selectedSlot && (
            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in">
              <div className="tactile-card p-6 w-full max-w-sm flex flex-col gap-4 animate-in zoom-in-95">
                <h3 className="font-black text-lg">{days[selectedSlot.col]}요일 {selectedSlot.row + 1}교시 - {selectedSlot.cell.subject}</h3>
                <textarea value={memoText} onChange={e=>setMemoText(e.target.value)} placeholder="수행평가, 준비물 등 메모 (클릭하여 수정)" className="debossed-well p-3 h-24 text-sm font-bold outline-none bg-transparent resize-none"></textarea>
                <div className="flex gap-2">
                  <button onClick={() => setSelectedSlot(null)} className="tactile-pill-btn flex-1 py-2 text-xs">닫기</button>
                  <button onClick={handleSaveMemo} className="tactile-pill-btn-primary flex-1 py-2 text-xs">메모 저장</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 4. 연동 급식 (NEIS OpenAPI 진짜 연동 + CORS Proxy)
    // ==========================================
    function MealView() {
      const [meal, setMeal] = useState('교육청 서버와 통신 중입니다...');
      const [dateStr, setDateStr] = useState('');

      useEffect(() => {
        const fetchMeal = async () => {
          const today = new Date();
          const yyyy = today.getFullYear();
          const mm = String(today.getMonth() + 1).padStart(2, '0');
          const dd = String(today.getDate()).padStart(2, '0');
          setDateStr(`${yyyy}년 ${mm}월 ${dd}일`);

          try {
            const apiUrl = `${NEIS_URL}/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&MLSV_YMD=${yyyy}${mm}${dd}`;
            
            // CORS 우회 프록시 적용
            const res = await fetch(CORS_PROXY + encodeURIComponent(apiUrl));
            const data = await res.json();
            
            if(data.mealServiceDietInfo) {
              const mealData = data.mealServiceDietInfo[1].row[0].DDISH_NM;
              const cleanMeal = mealData.replace(/<br\/>/g, '\n').replace(/[0-9.*]/g, ''); 
              setMeal(cleanMeal);
            } else if (data.RESULT && data.RESULT.CODE === 'INFO-200') {
              setMeal('학교에서 아직 오늘의 급식 정보를 나이스 서버에 올리지 않았거나,\n오늘은 주말/휴일입니다. 😋');
            } else {
              setMeal('급식 정보를 불러오지 못했습니다.');
            }
          } catch (e) {
            console.error('급식 연동 실패:', e);
            setMeal("보안망이나 네트워크 문제로 급식 서버와 통신할 수 없습니다.");
          }
        };
        fetchMeal();
      }, []);

      return (
        <div className="p-6 flex flex-col h-full">
          <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2 mb-6"><Icons.Meal /> 오늘의 급식</h2>
          
          <div className="flex-1 flex items-center justify-center">
            <div className="tactile-plate p-10 w-full max-w-md text-center border-4 border-white/50 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1.5 bg-[#CBD5E1]">
                <div className="h-full bg-emerald-500 w-1/3 animate-[pulse_2s_ease-in-out_infinite]"></div>
              </div>
              <div className="w-20 h-20 bg-blue-100 rounded-full mx-auto mb-6 flex items-center justify-center text-blue-500 shadow-inner">
                <Icons.Meal />
              </div>
              <h3 className="text-lg font-black text-slate-500 mb-2">{dateStr} 고촌고 급식</h3>
              <div className="debossed-well p-6 mt-4">
                <p className="text-xl font-black text-slate-800 leading-loose whitespace-pre-wrap">{meal}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 5. 자료 보관함
    // ==========================================
    function ArchiveView() {
      const [files, setFiles] = useState(() => JSON.parse(localStorage.getItem('duru_archive')) || []);
      const [isUploading, setIsUploading] = useState(false);
      const [title, setTitle] = useState('');
      const [fileData, setFileData] = useState(null);
      const [fileName, setFileName] = useState('');

      const saveFiles = (newFiles) => {
        setFiles(newFiles);
        localStorage.setItem('duru_archive', JSON.stringify(newFiles));
      };

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (file) {
          setFileName(file.name);
          const reader = new FileReader();
          reader.onload = (event) => setFileData(event.target.result);
          reader.readAsDataURL(file); // 임시 보관을 위해 base64 변환
        }
      };

      const handleUpload = () => {
        if(!title || !fileData) return;
        saveFiles([{ id: Date.now(), title, fileName, fileData, date: new Date().toLocaleDateString() }, ...files]);
        setIsUploading(false); setTitle(''); setFileData(null); setFileName('');
      };

      return (
        <div className="p-6 flex flex-col h-full">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><Icons.Archive /> 자료 보관함</h2>
            <button onClick={() => setIsUploading(!isUploading)} className="tactile-pill-btn-primary px-4 py-2 text-xs flex items-center gap-1">
              <Icons.Plus /> 자료 올리기
            </button>
          </div>

          {isUploading && (
            <div className="debossed-well p-4 mb-6 flex flex-col gap-3">
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="자료명 (예: 국어 프린트 3p 스캔본)" className="bg-transparent font-black text-sm outline-none w-full" />
              <div className="flex items-center gap-2 mt-2">
                <label className="tactile-pill-btn px-4 py-2 text-xs bg-slate-200">
                  파일 선택
                  <input type="file" onChange={handleFile} className="hidden" />
                </label>
                <span className="text-xs font-bold text-slate-500">{fileName || '선택된 파일 없음'}</span>
              </div>
              <div className="flex justify-end gap-2 mt-2">
                <button onClick={() => setIsUploading(false)} className="tactile-pill-btn py-2 px-4 text-xs">취소</button>
                <button onClick={handleUpload} className="tactile-pill-btn-primary py-2 px-4 text-xs">업로드</button>
              </div>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 overflow-y-auto pr-2">
            {files.length === 0 && <p className="col-span-3 text-center text-slate-500 font-bold mt-10">보관된 자료가 없습니다.</p>}
            {files.map(file => (
              <div key={file.id} className="tactile-card p-5 flex flex-col gap-2 relative group">
                <div className="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 mb-2"><Icons.Archive /></div>
                <h3 className="font-black text-slate-800 truncate">{file.title}</h3>
                <p className="text-xs text-slate-500 font-bold">{file.fileName}</p>
                <p className="text-[10px] text-slate-400 font-semibold">{file.date}</p>
                <a href={file.fileData} download={file.fileName} className="tactile-pill-btn-primary mt-2 text-center py-2 text-xs w-full">다운로드</a>
                <button onClick={() => saveFiles(files.filter(f => f.id !== file.id))} className="absolute top-4 right-4 tactile-pill-btn p-1.5 opacity-0 group-hover:opacity-100 !text-red-500">
                  <Icons.Trash />
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // 6. Tester View (히든 라우팅용)
    // ==========================================
    function TesterView() {
      return (
        <div className="p-6 flex flex-col items-center justify-center h-full text-center">
          <div className="w-24 h-24 bg-slate-800 rounded-3xl flex items-center justify-center text-white mb-6 animate-pulse shadow-[inset_0_-8px_0_rgba(0,0,0,0.2)]">

          <h2 className="text-3xl font-black text-slate-800 mb-2">DURU Developer Mode</h2>

            환영합니다. 이 화면은 URL에 /tester 가 포함되었을 때 렌더링되는 개발자 모드입니다. <br/>
            추후 파이어베이스 DB 초기화 및 강제 동기화 툴을 이곳에 배치할 수 있습니다.

      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));

  </script>
</body>
