<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기후 마스터 - Pure Offline</title>
    <style>
        /* 기본 리셋 및 One UI 8.5 스타일 폰트/배경 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #1c1c1e;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            user-select: none;
        }

        /* 레이아웃 */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 100px 16px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; color: #007aff; letter-spacing: -0.5px; }
        .header p { margin: 4px 0 0; font-size: 13px; color: #8e8e93; }

        /* 카드 UI (One UI 스타일) */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            margin-bottom: 16px;
        }

        /* 그래프를 담는 컨테이너 */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
            background: #fafafa;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }
        
        .compare-canvas-wrapper {
            height: 180px;
            margin-bottom: 10px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 퀴즈 UI 요소 */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .badge {
            background: #e5f1ff;
            color: #007aff;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .counter { font-size: 14px; font-weight: 700; color: #1c1c1e; }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            border: none;
            border-radius: 16px;
            padding: 16px 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            background: #ffffff;
            color: #1c1c1e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 2px solid transparent;
        }
        .btn:active { transform: scale(0.96); }
        .btn.correct { background: #34c759; color: #fff; box-shadow: 0 4px 12px rgba(52,199,89,0.3); }
        .btn.wrong { background: #ff3b30; color: #fff; box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
        
        .btn-action {
            width: 100%;
            background: #007aff;
            color: #fff;
            margin-top: 15px;
            padding: 18px;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,122,255,0.3);
            display: none;
        }

        /* 피드백 박스 */
        .feedback-box {
            margin-top: 15px;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            display: none;
        }
        .feedback-box.show { display: block; }
        .feedback-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .feedback-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        /* 비교 섹션 셀렉트 박스 */
        select {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #e5e5ea;
            background: #fff;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #1c1c1e;
            -webkit-appearance: none;
            outline: none;
        }

        /* 리스트 스타일 (사전/오답노트) */
        .list-item {
            padding: 16px 0;
            border-bottom: 1px solid #f2f2f7;
        }
        .list-item:last-child { border-bottom: none; }
        .list-title { font-size: 16px; font-weight: 700; color: #007aff; margin-bottom: 4px; }
        .list-desc { font-size: 14px; color: #3a3a3c; }
        .list-tip { font-size: 13px; color: #ff9500; font-weight: 600; margin-top: 6px; background: #fff8e1; padding: 6px 10px; border-radius: 8px; display: inline-block; }

        /* 하단 플로팅 네비게이션 바 */
        .floating-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            height: 64px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 1000;
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-btn.active { color: #007aff; }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 2px; fill: currentColor; }

        /* 섹션 표시 제어 */
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>기후 마스터</h1>
        <p>인터넷 없이도 완벽한 학습 앱</p>
    </div>

    <!-- 1. 퀴즈 섹션 -->
    <div id="sec-quiz" class="section active">
        <div class="card">
            <div class="quiz-header">
                <span class="badge">기후 그래프 분석</span>
                <span id="quiz-counter" class="counter">1 / 14</span>
            </div>
            <!-- 순수 HTML5 Canvas를 이용한 자체 렌더링 그래프 -->
            <div class="canvas-wrapper">
                <canvas id="canvas-quiz"></canvas>
            </div>
        </div>
        <div id="choices-container" class="choices-grid"></div>
        <div id="feedback-msg" class="feedback-box"></div>
        <button id="btn-next" class="btn btn-action" onclick="app.nextQuiz()">다음 문제로 이동</button>
    </div>

    <!-- 2. 비교 섹션 -->
    <div id="sec-compare" class="section">
        <div class="card">
            <h3 style="margin-top:0; margin-bottom: 15px; text-align: center; color:#1c1c1e;">두 기후 비교하기</h3>
            
            <select id="sel-compare-1" onchange="app.updateCompare()"></select>
            <div class="canvas-wrapper compare-canvas-wrapper">
                <canvas id="canvas-compare-1"></canvas>
            </div>
            
            <select id="sel-compare-2" onchange="app.updateCompare()" style="margin-top: 15px;"></select>
            <div class="canvas-wrapper compare-canvas-wrapper">
                <canvas id="canvas-compare-2"></canvas>
            </div>
            
            <div id="compare-result" style="margin-top:15px; padding:15px; background:#f2f2f7; border-radius:12px; font-size:14px; line-height:1.6;"></div>
        </div>
    </div>

    <!-- 3. 사전 섹션 -->
    <div id="sec-dict" class="section">
        <div class="card" style="padding: 10px 20px;" id="dict-container"></div>
    </div>

    <!-- 4. 통계(오답) 섹션 -->
    <div id="sec-stats" class="section">
        <div class="card">
            <h3 style="margin-top:0; color:#1c1c1e;">내 오답 노트</h3>
            <p style="font-size:13px; color:#8e8e93; margin-top:-10px; margin-bottom:15px;">틀렸던 문제들을 다시 복습하세요.</p>
            <div id="stats-container"></div>
            <button class="btn" style="width:100%; margin-top:20px; color:#ff3b30; border: 1px solid #ffebee; background:#fffaf9;" onclick="app.resetStats()">오답 기록 모두 지우기</button>
        </div>
    </div>
</div>

<!-- 플로팅 네비게이션 바 -->
<div class="floating-nav">
    <button class="nav-btn active" onclick="app.switchTab('quiz', this)">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        퀴즈
    </button>
    <button class="nav-btn" onclick="app.switchTab('compare', this)">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H6c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1h12c.55 0 1 .45 1 1v12c0 .55-.45 1-1 1zm-7-2h2V7h-2v10zm-4 0h2v-6H7v6zm8 0h2v-8h-2v8z"/></svg>
        비교
    </button>
    <button class="nav-btn" onclick="app.switchTab('dict', this)">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
        사전
    </button>
    <button class="nav-btn" onclick="app.switchTab('stats', this)">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        오답
    </button>
</div>

<script>
    // 1. 기후 데이터 세트 (총 14개 완벽 탑재)
    const climateData = [
        { id: 'Af', name: '열대 우림 (Af)', desc: '연중 매우 덥고 비가 많이 내립니다. 건기가 없습니다.', temp: [26, 27, 27, 26, 27, 26, 26, 27, 27, 27, 26, 26], rain: [250, 230, 280, 260, 240, 210, 200, 220, 240, 250, 260, 270], tip: '파란색 강수량 막대가 1년 내내 꽉 차 있습니다.' },
        { id: 'Am', name: '열대 몬순 (Am)', desc: '짧은 건기가 있지만, 우기에 폭우가 쏟아집니다.', temp: [25, 26, 28, 29, 28, 27, 26, 26, 27, 27, 26, 25], rain: [10, 20, 50, 150, 400, 600, 750, 650, 400, 200, 80, 20], tip: '여름철 강수량 막대가 천장을 뚫을 만큼 높습니다.' },
        { id: 'Aw', name: '사바나 (Aw)', desc: '우기와 건기가 뚜렷합니다. 동물의 왕국 배경입니다.', temp: [24, 25, 27, 28, 27, 25, 24, 24, 25, 26, 25, 24], rain: [5, 5, 20, 80, 200, 250, 300, 280, 180, 60, 10, 5], tip: '겨울철에 강수량이 거의 바닥(0)에 붙어있습니다.' },
        { id: 'BS', name: '스텝 (BS)', desc: '강수량이 적어 짧은 풀이 자라는 초원 기후입니다.', temp: [15, 18, 22, 26, 30, 32, 33, 32, 30, 25, 20, 16], rain: [30, 35, 40, 45, 50, 20, 10, 15, 25, 40, 35, 30], tip: '비가 적지만 사막보다는 강수 막대가 확연히 보입니다.' },
        { id: 'BW', name: '사막 (BW)', desc: '연 강수량 250mm 미만으로 비가 거의 오지 않습니다.', temp: [12, 15, 20, 25, 30, 34, 36, 35, 31, 25, 18, 13], rain: [10, 12, 8, 5, 2, 0, 0, 1, 3, 7, 12, 10], tip: '1년 내내 강수량 막대가 바닥에 딱 붙어 있습니다.' },
        { id: 'H',  name: '고산 (H)',  desc: '적도 근처의 높은 산지로, 1년 내내 봄처럼 서늘합니다.', temp: [13, 13, 14, 14, 14, 14, 13, 13, 14, 14, 14, 13], rain: [50, 60, 80, 120, 150, 100, 80, 70, 130, 140, 90, 60], tip: '빨간색 기온선이 10~15도 사이에서 일직선을 그립니다.' },
        { id: 'Cs', name: '지중해성 (Cs)', desc: '여름은 덥고 건조하며, 겨울은 온화하고 비가 내립니다.', temp: [10, 11, 13, 16, 20, 24, 27, 27, 24, 19, 14, 11], rain: [120, 100, 80, 50, 20, 5, 2, 5, 25, 60, 100, 130], tip: '기온이 올라가는 여름에 강수량이 푹 파여(V자) 있습니다.' },
        { id: 'Cfb',name: '서안 해양성 (Cfb)',desc: '여름이 시원하고, 1년 내내 비가 고르게 내립니다.', temp: [5, 6, 9, 12, 15, 18, 20, 20, 17, 13, 8, 6], rain: [80, 70, 75, 70, 75, 80, 85, 90, 85, 95, 90, 95], tip: '강수량 막대들의 키가 연중 비슷비슷합니다.' },
        { id: 'Cfa',name: '온난 습윤 (Cfa)', desc: '여름이 매우 덥고 비가 많습니다. 기온 연교차가 큽니다.', temp: [4, 6, 11, 17, 22, 25, 28, 29, 24, 18, 12, 6], rain: [60, 70, 110, 130, 150, 180, 160, 190, 220, 150, 90, 60], tip: '온대 기후 중에서 가장 기온선이 뾰족하게 올라갑니다.' },
        { id: 'Cw', name: '온대 겨울 건조 (Cw)', desc: '여름엔 비가 많이 오고, 겨울엔 비가 매우 적게 옵니다.', temp: [12, 14, 18, 22, 26, 28, 29, 28, 26, 22, 18, 14], rain: [10, 15, 30, 80, 180, 250, 350, 320, 200, 60, 20, 10], tip: '겨울철 강수량이 눈에 띄게 적습니다.' },
        { id: 'Dw', name: '냉대 겨울 건조 (Dw)', desc: '겨울이 매우 춥고 건조합니다. 연교차가 매우 큽니다.', temp: [-15, -10, 0, 10, 18, 22, 25, 24, 18, 8, -5, -12], rain: [5, 8, 15, 40, 70, 120, 200, 180, 80, 30, 15, 7], tip: '기온선이 영하 밑으로 깊게 내려가고, 겨울 비가 없습니다.' },
        { id: 'Df', name: '냉대 습윤 (Df)', desc: '겨울이 춥지만 1년 내내 눈이나 비가 고르게 내립니다.', temp: [-10, -7, -2, 6, 13, 18, 21, 20, 14, 6, -2, -8], rain: [50, 45, 50, 60, 70, 80, 90, 85, 75, 65, 60, 55], tip: '추운 냉대 기후임에도 강수 막대가 비교적 평평합니다.' },
        { id: 'ET', name: '툰드라 (ET)', desc: '매우 춥지만, 짧은 여름 동안 영상으로 올라가 이끼가 자랍니다.', temp: [-25, -23, -18, -10, -2, 4, 8, 7, 1, -8, -16, -22], rain: [10, 10, 15, 15, 20, 30, 40, 45, 35, 25, 20, 15], tip: '기온선 정점이 0도에서 10도 사이에만 살짝 걸칩니다.' },
        { id: 'EF', name: '빙설 (EF)', desc: '1년 내내 영하로, 눈과 얼음으로 덮여 있습니다.', temp: [-40, -38, -35, -30, -25, -22, -20, -21, -26, -32, -37, -40], rain: [5, 5, 3, 2, 2, 1, 1, 1, 2, 3, 5, 5], tip: '기온선이 0도 기준선 훨씬 아래(바닥)에 있습니다.' }
    ];

    // 2. 핵심 로직 관리 객체
    const app = {
        quizList: [],
        currentIdx: 0,
        currentClimate: null,
        wrongList: [],

        init() {
            // 로컬스토리지에서 오답노트 불러오기
            const saved = localStorage.getItem('climate_master_pure_offline');
            if(saved) this.wrongList = JSON.parse(saved);

            this.initQuiz();
            this.initCompareSelectors();
            this.renderDict();
        },

        // --- 네비게이션 제어 ---
        switchTab(tabId, btnElem) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('sec-' + tabId).classList.add('active');
            btnElem.classList.add('active');
            window.scrollTo(0, 0);

            if(tabId === 'stats') this.renderStats();
            if(tabId === 'compare') this.updateCompare();
        },

        // --- 자체 제작 Canvas 기반 그래프 렌더링 엔진 ---
        drawCustomChart(canvasId, data) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // 해상도 대응 (선명도 향상)
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            
            const w = rect.width;
            const h = rect.height;
            
            // 화면 지우기
            ctx.clearRect(0, 0, w, h);

            // 그래프 여백 설정
            const padL = 40, padR = 35, padT = 20, padB = 25;
            const plotW = w - padL - padR;
            const plotH = h - padT - padB;

            // 축 및 눈금선 그리기
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#e5e5ea';
            ctx.fillStyle = '#8e8e93';
            ctx.font = '10px -apple-system, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';

            // 기온 (왼쪽 축: -50도 ~ 40도)
            const tempSteps = [40, 20, 0, -20, -40];
            tempSteps.forEach(temp => {
                const y = padT + plotH - ((temp + 50) / 90) * plotH;
                // 눈금 선
                ctx.beginPath();
                ctx.moveTo(padL, y);
                ctx.lineTo(padL + plotW, y);
                // 0도 선은 진하게
                if(temp === 0) { ctx.strokeStyle = 'rgba(255, 59, 48, 0.4)'; ctx.lineWidth = 2; } 
                else { ctx.strokeStyle = '#e5e5ea'; ctx.lineWidth = 1; }
                ctx.stroke();
                
                // 라벨
                ctx.fillStyle = temp === 0 ? '#ff3b30' : '#8e8e93';
                ctx.fillText(temp + '°', padL - 5, y);
            });

            // 강수량 (오른쪽 축: 0 ~ 800mm)
            ctx.textAlign = 'left';
            ctx.fillStyle = '#007aff';
            const rainSteps = [0, 200, 400, 600, 800];
            rainSteps.forEach(rain => {
                const y = padT + plotH - (rain / 800) * plotH;
                ctx.fillText(rain, padL + plotW + 5, y);
            });

            // X축 (월별) 라벨 표시
            ctx.textAlign = 'center';
            ctx.fillStyle = '#1c1c1e';
            for(let i = 0; i < 12; i++) {
                const x = padL + (i + 0.5) * (plotW / 12);
                if (i % 2 === 0) { // 공간 확보를 위해 홀수달(1,3,5...)만 표시
                    ctx.fillText((i + 1) + '월', x, padT + plotH + 15);
                }
            }

            // --- 1. 강수량 막대 그리기 ---
            const barW = (plotW / 12) * 0.6; // 막대 너비
            ctx.fillStyle = 'rgba(0, 122, 255, 0.5)';
            data.rain.forEach((rain, i) => {
                const x = padL + (i + 0.5) * (plotW / 12) - (barW / 2);
                let barH = (rain / 800) * plotH;
                if(barH > plotH) barH = plotH; // 한계치 초과 방지
                const y = padT + plotH - barH;
                
                // 모서리가 둥근 막대 (위쪽만)
                ctx.beginPath();
                ctx.moveTo(x, y + barH);
                ctx.lineTo(x, y + 2);
                ctx.quadraticCurveTo(x, y, x + 2, y);
                ctx.lineTo(x + barW - 2, y);
                ctx.quadraticCurveTo(x + barW, y, x + barW, y + 2);
                ctx.lineTo(x + barW, y + barH);
                ctx.fill();
            });

            // --- 2. 기온 꺾은선 그리기 ---
            ctx.strokeStyle = '#ff3b30';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            
            const pointsX = [];
            const pointsY = [];

            data.temp.forEach((temp, i) => {
                const x = padL + (i + 0.5) * (plotW / 12);
                let tempY = temp;
                if(tempY > 40) tempY = 40; if(tempY < -50) tempY = -50;
                const y = padT + plotH - ((tempY + 50) / 90) * plotH;
                
                pointsX.push(x);
                pointsY.push(y);

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // 기온 점(Circle) 그리기
            ctx.fillStyle = '#ffffff';
            for(let i=0; i<12; i++) {
                ctx.beginPath();
                ctx.arc(pointsX[i], pointsY[i], 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        },

        // --- 퀴즈 로직 ---
        initQuiz() {
            // 배열 섞기
            this.quizList = [...climateData].sort(() => Math.random() - 0.5);
            this.currentIdx = 0;
            this.loadQuiz();
        },

        loadQuiz() {
            if(this.currentIdx >= this.quizList.length) {
                alert('수고하셨습니다! 모든 문제를 풀었습니다. 다시 시작합니다.');
                this.initQuiz();
                return;
            }

            this.currentClimate = this.quizList[this.currentIdx];
            document.getElementById('quiz-counter').innerText = `${this.currentIdx + 1} / ${this.quizList.length}`;
            
            // 피드백 및 다음 버튼 초기화
            document.getElementById('feedback-msg').className = 'feedback-box';
            document.getElementById('btn-next').style.display = 'none';

            // 그래프 그리기 (Canvas)
            this.drawCustomChart('canvas-quiz', this.currentClimate);

            // 4지선다 보기 생성
            const choices = [this.currentClimate];
            const others = climateData.filter(d => d.id !== this.currentClimate.id).sort(() => Math.random() - 0.5);
            choices.push(others[0], others[1], others[2]);
            choices.sort(() => Math.random() - 0.5); // 보기 순서 섞기

            const grid = document.getElementById('choices-container');
            grid.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = c.name;
                btn.onclick = () => this.checkAnswer(c.id, btn);
                grid.appendChild(btn);
            });
        },

        checkAnswer(selectedId, btnElement) {
            const fb = document.getElementById('feedback-msg');
            const btns = document.querySelectorAll('#choices-container .btn');
            btns.forEach(b => b.disabled = true); // 중복 클릭 방지

            if(selectedId === this.currentClimate.id) {
                btnElement.classList.add('correct');
                fb.innerHTML = `🎉 정답입니다!<br><span style="font-size:12px; font-weight:normal;">${this.currentClimate.tip}</span>`;
                fb.className = 'feedback-box show feedback-success';
                
                // 맞히면 오답노트에서 제거
                this.wrongList = this.wrongList.filter(id => id !== this.currentClimate.id);
            } else {
                btnElement.classList.add('wrong');
                fb.innerHTML = `😥 아쉽습니다. 정답은 <b>[${this.currentClimate.name}]</b> 입니다.<br><span style="font-size:12px; font-weight:normal;">기억하세요: ${this.currentClimate.tip}</span>`;
                fb.className = 'feedback-box show feedback-error';
                
                // 틀리면 오답노트에 추가
                if(!this.wrongList.includes(this.currentClimate.id)) {
                    this.wrongList.push(this.currentClimate.id);
                }
            }
            // 브라우저에 저장
            localStorage.setItem('climate_master_pure_offline', JSON.stringify(this.wrongList));
            document.getElementById('btn-next').style.display = 'block';
        },

        nextQuiz() {
            this.currentIdx++;
            this.loadQuiz();
        },

        // --- 비교 로직 ---
        initCompareSelectors() {
            const s1 = document.getElementById('sel-compare-1');
            const s2 = document.getElementById('sel-compare-2');
            climateData.forEach(d => {
                s1.add(new Option(d.name, d.id));
                s2.add(new Option(d.name, d.id));
            });
            s2.selectedIndex = 1; // 기본적으로 서로 다른 걸 보여줌
        },

        updateCompare() {
            const id1 = document.getElementById('sel-compare-1').value;
            const id2 = document.getElementById('sel-compare-2').value;
            
            const data1 = climateData.find(d => d.id === id1);
            const data2 = climateData.find(d => d.id === id2);

            this.drawCustomChart('canvas-compare-1', data1);
            this.drawCustomChart('canvas-compare-2', data2);

            const resultDiv = document.getElementById('compare-result');
            resultDiv.innerHTML = `
                <div style="color:#007aff; font-weight:700; margin-bottom:4px;">${data1.name} 특징</div>
                <div style="margin-bottom:10px;">${data1.tip}</div>
                <div style="border-top:1px solid #e5e5ea; padding-top:10px; color:#ff3b30; font-weight:700; margin-bottom:4px;">${data2.name} 특징</div>
                <div>${data2.tip}</div>
            `;
        },

        // --- 사전 및 오답노트 로직 ---
        renderDict() {
            const container = document.getElementById('dict-container');
            climateData.forEach(d => {
                container.innerHTML += `
                    <div class="list-item">
                        <div class="list-title">${d.name}</div>
                        <div class="list-desc">${d.desc}</div>
                        <div class="list-tip">💡 ${d.tip}</div>
                    </div>
                `;
            });
        },

        renderStats() {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';
            
            if(this.wrongList.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:30px 0; color:#8e8e93;">모든 문제를 다 맞히셨네요! 대단합니다.</div>';
                return;
            }

            this.wrongList.forEach(id => {
                const d = climateData.find(x => x.id === id);
                if(d) {
                    container.innerHTML += `
                        <div class="list-item">
                            <div class="list-title">${d.name}</div>
                            <div class="list-tip">${d.tip}</div>
                        </div>
                    `;
                }
            });
        },

        resetStats() {
            if(confirm('오답 기록을 정말 모두 지울까요?')) {
                this.wrongList = [];
                localStorage.removeItem('climate_master_pure_offline');
                this.renderStats();
            }
        }
    };

    // 앱 시작
    window.onload = () => app.init();
</script>
