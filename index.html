<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duru - 실시간 학급 협업</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .one-panel { background: white; border-radius: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.02), 0 0 1px rgba(0,0,0,0.05); }
        .one-item { background: #F2F2F7; border-radius: 24px; }
        .btn-press:active { transform: scale(0.96); opacity: 0.8; }
        .btn-press { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.2s; }
        .nav-active { background-color: #F2F2F7; color: #000 !important; }
        .hidden-text { max-height: 0; opacity: 0; margin-top: 0; pointer-events: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus { outline: none; border-color: #007AFF; }
        .modal-bg { background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        
        .live-badge { display: flex; align-items: center; gap: 6px; background: white; padding: 6px 12px; border-radius: 100px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .pulse-dot { width: 6px; height: 6px; background: #007AFF; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .loader { width: 20px; height: 20px; border: 3px solid #E5E5EA; border-top-color: #007AFF; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 권한 오류 안내 박스 */
        #permission-error { display: none; }
    </style>
</head>
<body class="selection:bg-[#E5F1FF]">

    <div id="app" class="min-h-screen flex flex-col max-w-2xl mx-auto relative pb-32">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-[#F2F2F7]/90 backdrop-blur-xl px-6 pt-12 pb-4 flex items-center justify-between">
            <h1 class="text-[30px] font-[900] tracking-tight">Duru</h1>
            <div id="status-badge" class="live-badge">
                <div class="pulse-dot" id="main-dot"></div>
                <span class="text-[11px] font-[900] text-[#007AFF]" id="status-text">CONNECTING</span>
            </div>
        </header>

        <!-- Permission Error Message -->
        <div id="permission-error" class="mx-5 mb-5 p-6 bg-red-50 border border-red-100 rounded-[24px]">
            <h2 class="text-red-600 font-[900] mb-2">데이터 접근 권한 오류</h2>
            <p class="text-red-500 text-sm font-[600] leading-relaxed">
                Firebase 콘솔의 <b>Firestore Database -> Rules</b> 설정이 아래와 같이 되어 있는지 확인해 주세요:<br>
                <code class="block mt-2 p-2 bg-red-100 rounded text-[12px]">allow read, write: if request.auth != null;</code>
            </p>
        </div>

        <!-- Main Content Area -->
        <main id="content" class="px-5 space-y-8 mt-4">
            <div id="loading-view" class="py-20 text-center">
                <div class="loader mx-auto mb-4"></div>
                <p class="text-gray-400 font-[800]">서버 연결 중...</p>
            </div>
        </main>

        <!-- Floating UI Navigation -->
        <div id="floating-bar" class="fixed left-1/2 -translate-x-1/2 bottom-6 w-[calc(100%-40px)] transition-all duration-500 z-50">
            <nav class="bg-white/95 backdrop-blur-2xl shadow-[0_8px_40px_rgba(0,0,0,0.1)] rounded-[100px] flex items-center justify-between p-2 h-[76px] transition-all duration-500" id="nav-container">
                <button onclick="setTab('home')" class="nav-item flex-1 flex flex-col items-center justify-center h-full rounded-full btn-press relative transition-all" id="btn-home">
                    <div class="relative z-10"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></div>
                    <span class="nav-text text-[11px] font-[900] mt-1 relative z-10 transition-all duration-300">홈</span>
                </button>
                <button onclick="setTab('time')" class="nav-item flex-1 flex flex-col items-center justify-center h-full rounded-full btn-press relative transition-all" id="btn-time">
                    <div class="relative z-10"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                    <span class="nav-text text-[11px] font-[900] mt-1 relative z-10 transition-all duration-300">시간표</span>
                </button>
                <button onclick="setTab('meal')" class="nav-item flex-1 flex flex-col items-center justify-center h-full rounded-full btn-press relative transition-all" id="btn-meal">
                    <div class="relative z-10"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
                    <span class="nav-text text-[11px] font-[900] mt-1 relative z-10 transition-all duration-300">급식</span>
                </button>
                <button onclick="setTab('class')" class="nav-item flex-1 flex flex-col items-center justify-center h-full rounded-full btn-press relative transition-all" id="btn-class">
                    <div class="relative z-10"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg></div>
                    <span class="nav-text text-[11px] font-[900] mt-1 relative z-10 transition-all duration-300">학급</span>
                </button>
            </nav>
        </div>

        <!-- Overlays -->
        <div id="modal-container" class="fixed inset-0 z-[100] hidden modal-bg flex items-end md:items-center justify-center p-0 md:p-6"></div>
    </div>

    <script>
        // --- 1. CONFIGURATION (사용자 제공 설정값) ---
        const MY_CONFIG = {
            apiKey: "AIzaSyAP8WRXAjmPdmATfWKnCrCRQNH0ftbBV9w",
            authDomain: "duru108.firebaseapp.com",
            projectId: "duru108",
            storageBucket: "duru108.firebasestorage.app",
            messagingSenderId: "669255987956",
            appId: "1:669255987956:web:7479e73d084a2faafb24a1"
        };

        const finalConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) ? JSON.parse(__firebase_config) : MY_CONFIG;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'duru-stable-v1';

        // Firebase Setup
        firebase.initializeApp(finalConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let state = {
            activeTab: 'home',
            data: { 
                announcements: [], schedules: [], materials: [], planner: [], 
                memos: {}, meals: {}, timetables: {} 
            },
            dates: getDates(),
            syncStarted: false
        };

        function getDates() {
            const now = new Date();
            const kst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
            const f = (d) => {
                const year = d.getUTCFullYear();
                const month = String(d.getUTCMonth() + 1).padStart(2, '0');
                const date = String(d.getUTCDate()).padStart(2, '0');
                return { str: `${year}-${month}-${date}` };
            };
            return { tdStr: f(kst).str, tmStr: f(new Date(kst.getTime() + 86400000)).str };
        }

        // --- 2. AUTH & SYNC ENGINE ---
        async function init() {
            const statusText = document.getElementById('status-text');
            const mainDot = document.getElementById('main-dot');

            try {
                // RULE 3: Auth Before Queries - 익명 인증 시도 및 확인
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else if (!auth.currentUser) {
                    await auth.signInAnonymously();
                }

                // 인증 상태 리스너
                auth.onAuthStateChanged(user => {
                    if (user) {
                        statusText.innerText = "LIVE";
                        mainDot.style.backgroundColor = "#007AFF";
                        // 인증 완료된 후 최초 1회만 데이터 구독 시작
                        if (!state.syncStarted) {
                            state.syncStarted = true;
                            startSync(user);
                        }
                    } else {
                        statusText.innerText = "AUTHENTICATING...";
                        mainDot.style.backgroundColor = "#FF9500";
                    }
                });
            } catch (e) {
                statusText.innerText = "AUTH ERROR";
                mainDot.style.backgroundColor = "#FF3B30";
                console.error("Auth Exception:", e);
            }
            render();
        }

        function startSync(user) {
            // RULE 1: Strict Paths
            const pub = (col) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
            const priv = (col) => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(col);

            const handleError = (colName) => (err) => {
                console.error(`Sync Error [${colName}]:`, err.message);
                if (err.code === 'permission-denied') {
                    document.getElementById('permission-error').style.display = 'block';
                    document.getElementById('status-text').innerText = "RESTRICTED";
                }
            };

            // 데이터 실시간 감시 시작
            pub('announcements').onSnapshot(s => { 
                state.data.announcements = s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>b.at-a.at); 
                render(); 
            }, handleError('announcements'));

            pub('schedules').onSnapshot(s => { 
                state.data.schedules = s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>new Date(a.date)-new Date(b.date)); 
                render(); 
            }, handleError('schedules'));

            pub('materials').onSnapshot(s => { 
                state.data.materials = s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>b.at-a.at); 
                render(); 
            }, handleError('materials'));

            pub('memos').onSnapshot(s => { 
                s.docs.forEach(d=>state.data.memos[d.id]=d.data().content); 
                render(); 
            }, handleError('memos'));

            pub('meals').onSnapshot(s => { 
                s.docs.forEach(d=>state.data.meals[d.id]=d.data().menu); 
                render(); 
            }, handleError('meals'));

            pub('timetables').onSnapshot(s => { 
                s.docs.forEach(d=>state.data.timetables[d.id]=d.data().periods); 
                render(); 
            }, handleError('timetables'));

            priv('planner').onSnapshot(s => { 
                state.data.planner = s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>b.at-a.at); 
                render(); 
            }, handleError('planner'));
        }

        // --- 3. UI RENDERING ---
        function setTab(tab) {
            state.activeTab = tab;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            render();
        }

        function render() {
            const container = document.getElementById('content');
            if (!container) return;
            const tab = state.activeTab;

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));
            const btn = document.getElementById(`btn-${tab}`);
            if (btn) btn.classList.add('nav-active');

            let html = '';
            if (tab === 'home') html = renderHome();
            else if (tab === 'time') html = renderTime();
            else if (tab === 'meal') html = renderMeal();
            else if (tab === 'class') html = renderClass();

            container.innerHTML = html;
        }

        function renderHome() {
            const meal = state.data.meals[state.dates.tdStr];
            const nextEvt = (state.data.schedules || []).filter(s => new Date(s.date) >= new Date(state.dates.tdStr))[0];

            return `
                <div class="one-panel p-8">
                    <div class="flex justify-between items-center mb-6"><h2 class="font-[900] text-[24px]">학급 알림</h2><button onclick="openInputModal('NOTICE')" class="btn-press text-[#007AFF] font-[900] text-sm bg-[#F2F2F7] px-4 py-2 rounded-full">작성</button></div>
                    <div class="space-y-4">${(state.data.announcements || []).length ? state.data.announcements.slice(0,2).map(a => `
                        <div class="one-item p-6 border border-white shadow-sm">
                            <h3 class="font-[900] text-[17px]">${a.title || '제목 없음'}</h3>
                            <p class="text-[14px] text-[#5C5C5C] mt-2 font-[600] leading-relaxed">${a.content || '내용 없음'}</p>
                        </div>
                    `).join('') : '<p class="text-center text-gray-400 py-6 font-[600]">새로운 공지사항이 없습니다.</p>'}</div>
                </div>
                <div class="one-panel p-8 text-center bg-gradient-to-br from-[#007AFF]/10 to-white min-h-[140px] flex flex-col justify-center">
                    <p class="text-[12px] font-[900] text-[#007AFF] mb-1 tracking-widest uppercase">다가오는 일정</p>
                    <div class="font-[900] text-[22px] text-[#1D1D1F]">${nextEvt ? nextEvt.title : '등록된 일정 없음'}</div>
                    ${nextEvt ? `<p class="text-[13px] font-[800] text-[#8E8E93] mt-1">${nextEvt.date}</p>` : ''}
                </div>
                <div class="one-panel p-8">
                    <div class="flex justify-between items-center mb-6"><h3 class="font-[900] text-[22px]">오늘의 점심 🍱</h3><button onclick="openInputModal('MEAL', '${state.dates.tdStr}')" class="text-[#007AFF] font-[900] text-sm">입력</button></div>
                    <div class="one-item p-6 flex flex-wrap justify-center gap-2">
                        ${meal ? meal.split(',').map(m => `<span class="bg-white px-4 py-1.5 rounded-full text-[15px] font-[900] shadow-sm">${m.trim()}</span>`).join('') : '<p class="text-gray-400 font-[800] py-4 text-center w-full">오늘의 메뉴를 입력해 보세요.</p>'}
                    </div>
                </div>
            `;
        }

        function renderTime() {
            const list = state.data.timetables[state.dates.tdStr] || [];
            return `
                <div class="one-panel p-2 flex mb-6 shadow-inner bg-[#F2F2F7]"><div class="flex-1 py-3 text-center rounded-[24px] bg-white shadow-sm font-[900]">오늘 시간표</div></div>
                <div class="space-y-4">
                    <button onclick="openInputModal('TIME', '${state.dates.tdStr}')" class="w-full py-5 one-panel text-[#007AFF] font-[900] text-lg border-2 border-dashed border-[#007AFF]/20 flex items-center justify-center gap-3">전체 시간표 편집</button>
                    ${list.length ? list.map((t, idx) => `
                        <div class="one-panel p-6 flex items-center justify-between transition-all hover:translate-y-[-2px]">
                            <div class="flex items-center gap-6">
                                <div class="w-12 h-12 one-item flex items-center justify-center font-[900] text-[22px] text-[#007AFF]">${idx+1}</div>
                                <div><h4 class="font-[900] text-[19px]">${t}</h4>${state.data.memos[state.dates.tdStr+'_'+(idx+1)] ? `<p class="text-[13px] text-[#007AFF] font-[900] mt-1">💡 ${state.data.memos[state.dates.tdStr+'_'+(idx+1)]}</p>` : ''}</div>
                            </div>
                            <button onclick="openInputModal('MEMO', '${state.dates.tdStr}_${idx+1}')" class="btn-press text-gray-300"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg></button>
                        </div>
                    `).join('') : '<div class="one-panel p-20 text-center text-gray-400 font-[900]">등록된 시간표 정보가 없습니다.</div>'}
                </div>
            `;
        }

        function renderMeal() {
            const Card = (d, title) => {
                const m = state.data.meals[d];
                return `
                    <div class="one-panel p-8 mb-8">
                        <div class="flex justify-between items-center mb-6"><h2 class="text-[22px] font-[900]">${title}</h2><button onclick="openInputModal('MEAL', '${d}')" class="text-[#007AFF] font-[900] text-sm bg-[#F2F2F7] px-4 py-2 rounded-full">편집</button></div>
                        <div class="one-item p-8 flex flex-wrap justify-center gap-2">
                            ${m ? m.split(',').map(it => `<span class="bg-white px-5 py-2 rounded-full text-[16px] font-[900] shadow-sm">${it.trim()}</span>`).join('') : '<p class="text-gray-400 font-[800] py-6 text-center w-full">정보가 없습니다.</p>'}
                        </div>
                    </div>
                `;
            }
            return Card(state.dates.tdStr, "오늘의 점심") + Card(state.dates.tmStr, "내일의 점심");
        }

        function renderClass() {
            return `
                <div class="space-y-8 pb-10">
                    <div class="one-panel p-8">
                        <div class="flex justify-between items-center mb-6"><h2 class="text-[22px] font-[900]">내 플래너</h2><button onclick="openInputModal('PLAN_ADD')" class="btn-press bg-[#007AFF] text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-xl">+</button></div>
                        <div class="space-y-4">
                            ${(state.data.planner || []).length ? state.data.planner.map(t => `
                                <div class="bg-white border border-[#E5E5EA] rounded-[24px] p-5 flex items-center justify-between shadow-sm">
                                    <button onclick="togglePlanner('${t.id}', ${!t.done})" class="flex items-center gap-4 flex-1 text-left">
                                        <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center ${t.done ? 'bg-[#007AFF] border-[#007AFF] text-white' : 'border-[#D1D1D6] text-transparent'}"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
                                        <span class="font-[900] text-[16px] ${t.done ? 'line-through text-gray-400' : ''}">${t.text}</span>
                                    </button>
                                    <button onclick="deleteDoc('planner', '${t.id}', true)" class="text-red-400 p-2 font-bold">×</button>
                                </div>
                            `).join('') : '<p class="text-center text-gray-400 py-6 font-[800]">오늘의 계획을 세워보세요.</p>'}
                        </div>
                    </div>
                    <div class="one-panel p-8">
                        <div class="flex justify-between items-center mb-6"><h2 class="text-[22px] font-[900]">통합 일정</h2><button onclick="openInputModal('SCHED')" class="text-[#007AFF] font-[900] bg-[#F2F2F7] px-4 py-2 rounded-full text-sm">일정 추가</button></div>
                        <div class="space-y-4">${(state.data.schedules || []).length ? state.data.schedules.map(s => `<div class="one-item p-5 flex justify-between items-center relative group"><div><h3 class="font-[900]">${s.title}</h3><p class="text-[12px] font-[800] text-[#8E8E93] mt-1">${s.date}</p></div><button onclick="deleteDoc('schedules', '${s.id}')" class="text-red-400 p-2">×</button></div>`).join('') : '<p class="text-center text-gray-400 py-6 font-[600]">예정된 일정이 없습니다.</p>'}</div>
                    </div>
                    <div class="one-panel p-8">
                        <div class="flex justify-between items-center mb-6"><h2 class="text-[22px] font-[900]">자료 보관함</h2><button onclick="openInputModal('FILE')" class="text-[#007AFF] font-[900] bg-[#F2F2F7] px-4 py-2 rounded-full text-sm">공유</button></div>
                        <div class="grid gap-4">${(state.data.materials || []).length ? state.data.materials.map(m => `<a href="${m.link}" target="_blank" class="one-item p-5 flex items-center justify-between shadow-sm border border-white"><div><h3 class="font-[900]">${m.title}</h3><p class="text-[12px] font-[800] text-[#8E8E93]">${m.subject}</p></div><button onclick="event.preventDefault(); deleteDoc('materials', '${m.id}')" class="text-red-400 p-2">×</button></a>`).join('') : '<p class="text-center text-gray-400 py-6 font-[600]">공유된 자료가 아직 없습니다.</p>'}</div>
                    </div>
                </div>
            `;
        }

        // --- 4. DATA ACTIONS ---
        async function togglePlanner(id, done) {
            const user = auth.currentUser;
            if (!user) return;
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('planner').doc(id).update({ done });
        }

        async function deleteDoc(col, id, isPrivate = false) {
            const user = auth.currentUser;
            if (!user || !confirm("정말로 삭제하시겠습니까?")) return;
            const ref = isPrivate ? db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(col) : db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
            await ref.doc(id).delete();
        }

        // --- 5. MODALS & UI HELPERS ---
        function openInputModal(type, targetId = '') { renderModal('INPUT', { type, targetId }); }

        function renderModal(type, payload = {}) {
            const mc = document.getElementById('modal-container');
            mc.classList.remove('hidden');
            let content = '';

            const title = {NOTICE:'새 공지', SCHED:'일정 등록', FILE:'자료 공유', PLAN_ADD:'할 일 추가', MEMO:'수업 메모', MEAL:'식단 입력', TIME:'시간표 편집'}[payload.type];
            content = `
                <div class="one-panel w-full max-w-md p-8 m-4 rounded-t-[40px] md:rounded-[40px] animate-in slide-in-from-bottom duration-300">
                    <h3 class="text-[22px] font-[900] mb-8 text-center">${title}</h3>
                    <div class="space-y-4">
                        ${payload.type === 'PLAN_ADD' || payload.type === 'MEMO' || payload.type === 'MEAL' || payload.type === 'TIME' ? `<input id="val-1" placeholder="${payload.type==='MEAL'?'메뉴들을 쉼표로 구분':(payload.type==='TIME'?'과목들을 쉼표로 구분':'내용 입력')}" class="w-full one-input p-5 text-lg">` : ''}
                        ${payload.type === 'NOTICE' ? `<input id="val-1" placeholder="제목" class="w-full one-input p-5"><textarea id="val-2" placeholder="상세 내용" class="w-full one-input p-5 min-h-[100px]"></textarea>` : ''}
                        ${payload.type === 'SCHED' ? `<input id="val-1" placeholder="일정 이름" class="w-full one-input p-5"><input id="val-2" type="date" class="w-full one-input p-5">` : ''}
                        ${payload.type === 'FILE' ? `<input id="val-1" placeholder="자료 이름" class="w-full one-input p-5"><input id="val-2" placeholder="과목" class="w-full one-input p-5"><input id="val-3" placeholder="URL 링크" class="w-full one-input p-5">` : ''}
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button onclick="closeModal()" class="flex-1 one-item py-5 font-[900] text-lg">취소</button>
                        <button onclick="submitInput('${payload.type}', '${payload.targetId}')" class="flex-1 bg-[#007AFF] text-white py-5 rounded-[28px] font-[900] text-lg shadow-lg">확인</button>
                    </div>
                </div>
            `;
            mc.innerHTML = content;
        }

        async function submitInput(type, targetId) {
            const user = auth.currentUser;
            if (!user) return alert("인증 처리 중입니다. 잠시만 기다려 주세요.");

            const pub = (col) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
            const priv = (col) => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(col);
            
            try {
                const v1 = document.getElementById('val-1')?.value;
                const v2 = document.getElementById('val-2')?.value;
                const v3 = document.getElementById('val-3')?.value;

                if (type === 'NOTICE') await pub('announcements').add({ title: v1, content: v2, at: Date.now() });
                if (type === 'PLAN_ADD') await priv('planner').add({ text: v1, done: false, date: state.dates.tdStr, at: Date.now() });
                if (type === 'SCHED') await pub('schedules').add({ title: v1, date: v2, at: Date.now() });
                if (type === 'FILE') await pub('materials').add({ title: v1, subject: v2, link: v3, at: Date.now() });
                if (type === 'MEMO') await pub('memos').doc(targetId).set({ content: v1, at: Date.now() });
                if (type === 'MEAL') await pub('meals').doc(targetId).set({ menu: v1, at: Date.now() });
                if (type === 'TIME') await pub('timetables').doc(targetId).set({ periods: (v1 || '').split(',').map(s=>s.trim()), at: Date.now() });
            } catch(e) { 
                console.error(e); 
                document.getElementById('permission-error').style.display = 'block';
            }
            closeModal();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        window.onscroll = function() {
            const nav = document.getElementById('nav-container');
            const wrap = document.getElementById('floating-bar');
            const texts = document.querySelectorAll('.nav-text');
            const isScrolled = window.scrollY > 40;

            if (isScrolled) {
                wrap.style.width = '240px';
                nav.style.height = '58px';
                texts.forEach(t => t.classList.add('hidden-text'));
            } else {
                wrap.style.width = 'calc(100% - 40px)';
                nav.style.height = '76px';
                texts.forEach(t => t.classList.remove('hidden-text'));
            }
        };

        init();
    </script>
</body>
</html>
