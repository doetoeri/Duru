<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duru Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Duru Design System */
        .one-panel { background: white; border-radius: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.02), 0 0 1px rgba(0,0,0,0.05); }
        .one-item { background: #F2F2F7; border-radius: 24px; }
        .btn-press:active { transform: scale(0.96); opacity: 0.8; }
        .btn-press { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.2s; }
        .nav-active { background-color: #F2F2F7; color: #000 !important; }
        .hidden-text { max-height: 0; opacity: 0; margin-top: 0; pointer-events: none; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-bg { background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        
        /* Utility */
        .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24; }
        .active-tab .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24; }
        .toast-active { transform: translate(-50%, -24px) !important; opacity: 1 !important; }
        
        /* Loading Animation */
        .loader { width: 30px; height: 30px; border: 4px solid #E5E5EA; border-top-color: #007AFF; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="selection:bg-[#E5F1FF] text-[#1D1D1F]">

    <div id="app" class="max-w-md mx-auto min-h-screen relative pb-32">
        <!-- Loading Screen -->
        <div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="loader mb-4"></div>
            <p class="text-[14px] font-[800] text-[#8E8E93] animate-pulse">데이터를 동기화 중입니다...</p>
        </div>

        <!-- In-app Toast -->
        <div id="toast" class="fixed bottom-0 left-1/2 -translate-x-1/2 mb-24 z-[300] bg-[#313033] text-white px-6 py-3 rounded-[100px] text-[13px] font-[800] shadow-xl opacity-0 transition-all duration-300 pointer-events-none whitespace-nowrap"></div>

        <!-- Global Confirm Modal -->
        <div id="confirm-modal" class="fixed inset-0 z-[250] hidden modal-bg items-center justify-center p-6">
            <div class="one-panel w-full max-w-xs p-8 animate-in zoom-in-95 duration-200">
                <h3 id="confirm-title" class="text-[20px] font-[900] mb-2 text-center text-[#1D1D1F]">확인</h3>
                <p id="confirm-desc" class="text-[14px] text-[#8E8E93] font-[600] text-center mb-8">설명이 표시됩니다.</p>
                <div class="flex gap-3">
                    <button onclick="ui.closeConfirm()" class="flex-1 py-3.5 bg-[#F2F2F7] rounded-full font-[800] text-[#5C5C5C] btn-press">취소</button>
                    <button id="confirm-btn" class="flex-1 py-3.5 bg-[#FF3B30] text-white rounded-full font-[800] btn-press">확인</button>
                </div>
            </div>
        </div>

        <!-- Admin Edit Question Modal -->
        <div id="edit-modal" class="fixed inset-0 z-[200] hidden modal-bg items-center justify-center p-6 overflow-y-auto">
            <div class="one-panel w-full max-w-sm p-8 my-auto animate-in slide-in-from-bottom-8 duration-300">
                <h2 class="text-[22px] font-[900] mb-6 text-center">문항 개별 편집</h2>
                <div class="space-y-4 max-h-[55vh] overflow-y-auto pr-2 no-scrollbar">
                    <div>
                        <label class="text-[11px] font-[900] text-[#8E8E93] block mb-2">질문 내용</label>
                        <textarea id="edit-q-text" class="w-full one-item p-4 text-[14px] font-[600] border-2 border-transparent outline-none focus:border-[#007AFF] transition-colors" rows="3"></textarea>
                    </div>
                    <div id="edit-options-container" class="space-y-3">
                        <label class="text-[11px] font-[900] text-[#8E8E93] block mb-2">선지 및 해설</label>
                    </div>
                    <div>
                        <label class="text-[11px] font-[900] text-[#007AFF] block mb-2">정답 인덱스 (0~4)</label>
                        <input type="number" id="edit-q-answer" min="0" max="4" class="w-full bg-[#E5F1FF] text-[#007AFF] font-[900] p-4 rounded-[20px] text-[16px] outline-none">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="ui.closeEditModal()" class="flex-1 py-4 bg-[#F2F2F7] rounded-full font-[800] text-[#5C5C5C] btn-press">닫기</button>
                    <button id="save-edit-btn" class="flex-1 py-4 bg-[#007AFF] text-white rounded-full font-[800] btn-press">저장하기</button>
                </div>
            </div>
        </div>

        <!-- Admin Auth Modal -->
        <div id="admin-modal" class="fixed inset-0 z-[200] hidden modal-bg items-center justify-center p-6">
            <div class="one-panel w-full max-w-sm p-8 animate-in zoom-in-95 duration-200">
                <h2 class="text-[22px] font-[900] mb-6 text-center">관리자 인증</h2>
                <input type="password" id="admin-pw-input" placeholder="비밀번호" class="w-full one-item px-6 py-4 text-center font-[800] outline-none border-2 border-transparent focus:border-[#007AFF] mb-6">
                <div class="flex gap-3">
                    <button onclick="ui.closeAdminModal()" class="flex-1 py-4 bg-[#F2F2F7] rounded-full font-[800] text-[#5C5C5C] btn-press">취소</button>
                    <button onclick="ui.verifyAdmin()" class="flex-1 py-4 bg-[#007AFF] text-white rounded-full font-[800] btn-press">확인</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="content" class="p-5 pt-12 mt-4 space-y-8"></div>

        <!-- Floating UI Navigation (Shrinking on Scroll) -->
        <div id="floating-bar" class="fixed left-1/2 -translate-x-1/2 bottom-6 w-[calc(100%-40px)] max-w-sm transition-all duration-500 z-50 hidden">
            <nav class="bg-white/95 backdrop-blur-2xl shadow-[0_8px_40px_rgba(0,0,0,0.08)] rounded-[100px] flex items-center justify-between p-2 h-[76px] transition-all duration-500" id="nav-container">
                <button onclick="router.navigate('home')" class="nav-btn nav-item flex-1 flex flex-col items-center justify-center h-full rounded-full btn-press relative transition-all text-gray-400" data-tab="home">
                    <div class="relative z-10 flex items-center justify-center"><span class="material-symbols-rounded text-[24px]">home</span></div>
                    <span class="nav-text text-[11px] font-[900] mt-1 relative z-10 transition-all duration-300">홈</span>
                </button>
                <button onclick="router.navigate('quiz')" class="nav-btn nav-item flex-1 flex flex-col items-center justify-center h-full rounded-full btn-press relative transition-all text-gray-400" data-tab="quiz">
                    <div class="relative z-10 flex items-center justify-center"><span class="material-symbols-rounded text-[24px]">quiz</span></div>
                    <span class="nav-text text-[11px] font-[900] mt-1 relative z-10 transition-all duration-300">시험 센터</span>
                </button>
                <button onclick="router.navigate('profile')" class="nav-btn nav-item flex-1 flex flex-col items-center justify-center h-full rounded-full btn-press relative transition-all text-gray-400" data-tab="profile">
                    <div class="relative z-10 flex items-center justify-center"><span class="material-symbols-rounded text-[24px]">history</span></div>
                    <span class="nav-text text-[11px] font-[900] mt-1 relative z-10 transition-all duration-300">학습기록</span>
                </button>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const defaultConfig = {
            apiKey: "AIzaSyDC6tQ3FMdYZ7uNUgLxKfOYELt8FEZ83bg",
            authDomain: "durutester.firebaseapp.com",
            projectId: "durutester",
            storageBucket: "durutester.firebasestorage.app",
            messagingSenderId: "1093780593477",
            appId: "1:1093780593477:web:b7fdfdc6e099e7aedffc2c"
        };

        let firebaseConfig = defaultConfig;
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.error("Firebase config parse error", e);
        }

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'durutester';

        window.state = {
            studentId: localStorage.getItem('duru_student_id') || '',
            isLoggedIn: !!localStorage.getItem('duru_student_id'),
            isAdmin: false,
            exams: [], 
            results: [],
            currentView: 'login',
            titleClicks: 0,
            
            currentExamId: null,
            quizIndex: 0,
            answers: [],
            
            editingExamId: null,
            editingQIdx: null,
            viewingResultId: null,
            isDataLoaded: false
        };

        const eCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'exams');
        const rCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'results');

        window.ui = {
            showToast: (msg) => {
                const t = document.getElementById('toast');
                if(!t) return;
                t.innerText = msg;
                t.classList.add('toast-active');
                setTimeout(() => t.classList.remove('toast-active'), 2500);
            },
            hideLoading: () => {
                const l = document.getElementById('loading');
                if (l) {
                    l.classList.add('opacity-0');
                    setTimeout(() => l.classList.add('hidden'), 500);
                }
            },
            openConfirm: (title, desc, onConfirm) => {
                const m = document.getElementById('confirm-modal');
                document.getElementById('confirm-title').innerText = title;
                document.getElementById('confirm-desc').innerText = desc;
                const btn = document.getElementById('confirm-btn');
                btn.onclick = () => { onConfirm(); ui.closeConfirm(); };
                m.classList.replace('hidden', 'flex');
            },
            closeConfirm: () => document.getElementById('confirm-modal').classList.replace('flex', 'hidden'),
            
            openEditModal: (examId, qIdx) => {
                const exam = window.state.exams.find(item => item.id === examId);
                if (!exam) return;
                const q = exam.questions[qIdx];
                if (!q) return;

                window.state.editingExamId = examId;
                window.state.editingQIdx = qIdx;

                document.getElementById('edit-q-text').value = q.question;
                document.getElementById('edit-q-answer').value = q.answer; 
                
                const container = document.getElementById('edit-options-container');
                container.innerHTML = '';
                
                const explanationsArray = Array.isArray(q.explanations) ? q.explanations : Array(q.options.length).fill(q.explanations || '');
                
                q.options.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = "one-item p-4 space-y-3";
                    div.innerHTML = `
                        <input type="text" value="${opt}" class="opt-val w-full bg-white px-4 py-3 rounded-[16px] text-[13px] font-[800] outline-none border-2 border-transparent focus:border-[#007AFF]" placeholder="선지 ${i+1}">
                        <input type="text" value="${explanationsArray[i] || ''}" class="exp-val w-full bg-white px-4 py-3 rounded-[16px] text-[12px] font-[600] outline-none border-2 border-transparent focus:border-[#007AFF]" placeholder="해설 ${i+1}">
                    `;
                    container.appendChild(div);
                });

                document.getElementById('edit-modal').classList.replace('hidden', 'flex');
            },
            closeEditModal: () => {
                document.getElementById('edit-modal').classList.replace('flex', 'hidden');
                window.state.editingExamId = null;
                window.state.editingQIdx = null;
            },
            saveQuestion: async () => {
                const examId = window.state.editingExamId;
                const qIdx = window.state.editingQIdx;
                const exam = window.state.exams.find(e => e.id === examId);
                
                const questionText = document.getElementById('edit-q-text').value;
                const answer = parseInt(document.getElementById('edit-q-answer').value);
                const options = Array.from(document.querySelectorAll('.opt-val')).map(el => el.value);
                const explanations = Array.from(document.querySelectorAll('.exp-val')).map(el => el.value);

                if (!questionText || isNaN(answer) || answer < 0 || answer >= options.length) {
                    return ui.showToast(`정확한 정답 인덱스(0~${options.length - 1})를 입력해주세요.`);
                }

                const updatedQuestions = [...exam.questions];
                updatedQuestions[qIdx] = {
                    ...updatedQuestions[qIdx],
                    question: questionText,
                    answer: answer,
                    options: options,
                    explanations: explanations
                };

                try {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'exams', examId), {
                        questions: updatedQuestions
                    });
                    ui.showToast("문항 수정 완료");
                    ui.closeEditModal();
                } catch (e) {
                    ui.showToast("수정 중 오류 발생");
                }
            },
            login: () => {
                const id = document.getElementById('student-id-input').value;
                if (id.length === 5 && /^\d+$/.test(id)) {
                    window.state.studentId = id;
                    window.state.isLoggedIn = true;
                    localStorage.setItem('duru_student_id', id);
                    ui.showToast(`${id}님 환영합니다!`);
                    router.navigate('home');
                } else {
                    ui.showToast("학번 5자리를 정확히 입력하세요.");
                }
            },
            logout: () => {
                ui.openConfirm("로그아웃", "로그아웃 하시겠습니까? (응시 기록은 보존됩니다)", () => {
                    window.state.isLoggedIn = false;
                    localStorage.removeItem('duru_student_id');
                    router.navigate('login');
                });
            },
            handleTitleClick: () => {
                window.state.titleClicks++;
                if (window.state.titleClicks >= 5) {
                    document.getElementById('admin-modal').classList.replace('hidden', 'flex');
                    window.state.titleClicks = 0;
                }
                setTimeout(() => window.state.titleClicks = 0, 3000);
            },
            closeAdminModal: () => document.getElementById('admin-modal').classList.replace('flex', 'hidden'),
            verifyAdmin: () => {
                if (document.getElementById('admin-pw-input').value === 'admin123') {
                    window.state.isAdmin = true;
                    ui.closeAdminModal();
                    ui.showToast("관리자 모드로 접속했습니다.");
                    router.navigate('admin_manage');
                } else {
                    ui.showToast("비밀번호 오류");
                }
            },
            addExam: async () => {
                const title = document.getElementById('exam-title-input').value.trim();
                const text = document.getElementById('json-input').value;
                
                if(!title) return ui.showToast("시험 제목을 입력해주세요.");
                if(!text) return ui.showToast("JSON 데이터를 입력해주세요.");
                
                try {
                    const data = JSON.parse(text);
                    const questions = Array.isArray(data) ? data : [data];
                    
                    await addDoc(eCol, { 
                        title: title,
                        questions: questions,
                        createdAt: serverTimestamp() 
                    });
                    
                    document.getElementById('exam-title-input').value = '';
                    document.getElementById('json-input').value = '';
                    ui.showToast(`[${title}] 등록 완료!`);
                } catch (e) {
                    console.error("Add Exam Error:", e);
                    ui.showToast("등록 실패: JSON 형식을 확인해주세요.");
                }
            },
            deleteExam: (id) => {
                ui.openConfirm("시험 삭제", "이 시험을 전체 삭제하시겠습니까?", async () => {
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'exams', id));
                    ui.showToast("삭제 완료");
                });
            },
            startQuiz: (examId) => {
                const exam = window.state.exams.find(e => e.id === examId);
                if (!exam || exam.questions.length === 0) return ui.showToast("문제가 없습니다.");
                
                window.state.currentExamId = examId;
                window.state.quizIndex = 0;
                window.state.answers = [];
                router.navigate('solving');
            },
            selectOption: (val) => {
                window.state.answers[window.state.quizIndex] = val;
                ui.render();
            },
            nextQuestion: () => {
                const exam = window.state.exams.find(e => e.id === window.state.currentExamId);
                if (window.state.quizIndex < exam.questions.length - 1) {
                    window.state.quizIndex++;
                    ui.render();
                } else {
                    ui.submitExam();
                }
            },
            submitExam: async () => {
                const exam = window.state.exams.find(e => e.id === window.state.currentExamId);
                let score = 0;
                
                const examSnapshot = exam.questions.map(q => ({
                    question: q.question,
                    options: q.options,
                    answer: q.answer, 
                    explanations: q.explanations || []
                }));

                exam.questions.forEach((q, i) => { 
                    if (window.state.answers[i] !== undefined && Number(q.answer) === Number(window.state.answers[i])) {
                        score++; 
                    }
                });
                
                const finalScore = Math.round((score / exam.questions.length) * 100);
                
                try {
                    const docRef = await addDoc(rCol, {
                        studentId: window.state.studentId,
                        examId: exam.id,
                        examTitle: exam.title,
                        score: finalScore,
                        answers: window.state.answers,
                        questionsSnapshot: examSnapshot,
                        timestamp: serverTimestamp()
                    });
                    
                    window.state.viewingResultId = docRef.id;
                    ui.showToast("수고하셨습니다. 제출 완료!");
                    router.navigate('result_detail');
                } catch(e) {
                    console.error("Submit Exam Error:", e);
                    ui.showToast("기록 저장 중 오류가 발생했습니다.");
                }
            },
            viewPastResult: (resultId) => {
                window.state.viewingResultId = resultId;
                router.navigate('result_detail');
            },
            render: () => {
                const content = document.getElementById('content');
                const nav = document.getElementById('floating-bar');
                if (!content || !nav) return;

                const isFullScreenView = ['login', 'solving', 'result_detail'].includes(window.state.currentView);
                nav.classList.toggle('hidden', isFullScreenView || window.state.isAdmin);

                document.querySelectorAll('.nav-btn').forEach(btn => {
                    const active = btn.dataset.tab === window.state.currentView;
                    if(active) {
                        btn.classList.add('nav-active');
                        btn.classList.replace('text-gray-400', 'text-black');
                    } else {
                        btn.classList.remove('nav-active');
                        btn.classList.replace('text-black', 'text-gray-400');
                    }
                });

                if (window.state.currentView === 'login') {
                    content.innerHTML = `
                        <div class="flex flex-col items-center justify-center min-h-[80vh] gap-10">
                            <div class="text-center select-none" onclick="ui.handleTitleClick()">
                                <div class="w-20 h-20 bg-white shadow-sm text-[#007AFF] rounded-[24px] flex items-center justify-center mx-auto mb-6">
                                    <span class="material-symbols-rounded text-4xl">history_edu</span>
                                </div>
                                <h1 class="text-[34px] font-[900] tracking-tight text-[#1D1D1F]">Duru Tester</h1>
                                <p class="text-[#8E8E93] text-[13px] mt-2 font-[800] tracking-widest uppercase">Smart Assessment</p>
                            </div>
                            <div class="w-full space-y-4">
                                <input id="student-id-input" type="text" maxlength="5" placeholder="학번 5자리 입력 (예: 10101)" 
                                    class="w-full one-panel py-5 px-8 text-center text-[18px] font-[800] outline-none border-2 border-transparent focus:border-[#007AFF] transition-all">
                                <button onclick="ui.login()" class="w-full bg-[#007AFF] text-white py-5 rounded-[32px] font-[900] text-[18px] shadow-lg btn-press">입장하기</button>
                            </div>
                        </div>
                    `;
                } else if (window.state.currentView === 'home') {
                    content.innerHTML = `
                        <div class="one-panel p-8 text-center bg-gradient-to-br from-[#007AFF]/10 to-white min-h-[140px] flex flex-col justify-center relative overflow-hidden">
                            <div class="relative z-10 text-left">
                                <p class="text-[12px] font-[900] text-[#007AFF] mb-1 tracking-widest uppercase">WELCOME BACK</p>
                                <h2 class="font-[900] text-[28px] text-[#1D1D1F]">${window.state.studentId}님</h2>
                                <p class="text-[13px] font-[600] text-[#5C5C5C] mt-2 leading-relaxed">하단 메뉴의 '시험 센터'에서<br>새로운 모의고사에 도전해보세요.</p>
                                <button onclick="router.navigate('quiz')" class="mt-4 bg-[#007AFF] text-white font-[900] py-3 px-6 rounded-full shadow-md btn-press text-[14px]">시험 센터로 이동</button>
                            </div>
                            <span class="material-symbols-rounded absolute -right-4 -bottom-6 text-[120px] text-[#007AFF]/5 rotate-12">local_library</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="one-panel p-6 flex flex-col items-center text-center">
                                <span class="material-symbols-rounded text-[#34C759] text-3xl mb-2">verified</span>
                                <p class="font-[900] text-[#1D1D1F] text-[15px]">진행 가능 시험</p>
                                <p class="text-[28px] font-[900] text-[#1D1D1F] mt-1">${window.state.exams.length}</p>
                            </div>
                            <div class="one-panel p-6 flex flex-col items-center text-center btn-press" onclick="router.navigate('profile')">
                                <span class="material-symbols-rounded text-[#FF9500] text-3xl mb-2">analytics</span>
                                <p class="font-[900] text-[#1D1D1F] text-[15px]">나의 응시 횟수</p>
                                <p class="text-[28px] font-[900] text-[#1D1D1F] mt-1">${window.state.results.filter(r => r.studentId === window.state.studentId).length}</p>
                            </div>
                        </div>
                    `;
                } else if (window.state.currentView === 'solving') {
                    const exam = window.state.exams.find(e => e.id === window.state.currentExamId);
                    const q = exam.questions[window.state.quizIndex];
                    if(!q) return router.navigate('home');
                    
                    content.innerHTML = `
                        <div class="flex flex-col items-center gap-2 mb-2">
                            <p class="text-[11px] font-[900] text-[#007AFF] uppercase tracking-widest">${exam.title}</p>
                            <div class="flex justify-between w-full items-center">
                                <span class="bg-[#E5F1FF] text-[#007AFF] px-4 py-1.5 rounded-full text-[12px] font-[900] uppercase">Q. ${window.state.quizIndex + 1} / ${exam.questions.length}</span>
                                <button onclick="router.navigate('quiz')" class="text-[#8E8E93] btn-press"><span class="material-symbols-rounded">close</span></button>
                            </div>
                        </div>
                        <div class="one-panel p-8 min-h-[160px] flex items-center">
                            <h2 class="text-[18px] font-[800] leading-relaxed tracking-tight break-keep text-[#1D1D1F]">${q.question}</h2>
                        </div>
                        <div class="space-y-3">
                            ${q.options.map((opt, i) => `
                                <button onclick="ui.selectOption(${i})" class="w-full p-5 rounded-[24px] text-left btn-press flex items-center gap-4 ${window.state.answers[window.state.quizIndex] === i ? 'bg-[#007AFF] text-white shadow-lg' : 'bg-white text-[#5C5C5C] shadow-[0_4px_20px_rgba(0,0,0,0.02)]'}">
                                    <span class="w-8 h-8 rounded-full flex items-center justify-center text-[14px] font-[900] ${window.state.answers[window.state.quizIndex] === i ? 'bg-white/20 text-white' : 'bg-[#F2F2F7] text-[#8E8E93]'}">${i + 1}</span>
                                    <span class="font-[800] text-[15px] leading-snug">${opt}</span>
                                </button>
                            `).join('')}
                        </div>
                        <button onclick="ui.nextQuestion()" ${window.state.answers[window.state.quizIndex] === undefined ? 'disabled' : ''} 
                            class="w-full bg-[#007AFF] text-white py-5 rounded-[32px] font-[900] text-[17px] shadow-lg disabled:opacity-30 disabled:scale-100 btn-press mt-6">
                            ${window.state.quizIndex === exam.questions.length - 1 ? '제출하고 채점하기' : '다음 문제'}
                        </button>
                    `;
                } else if (window.state.currentView === 'result_detail') {
                    const res = window.state.results.find(r => r.id === window.state.viewingResultId);
                    if (!res) {
                        content.innerHTML = `<p class="text-center py-20 text-[#8E8E93] font-[800]">기록을 불러오는 중이거나 찾을 수 없습니다.</p>`;
                        return;
                    }
                    const qs = res.questionsSnapshot || [];
                    content.innerHTML = `
                        <div class="flex items-center gap-4 mb-4">
                            <button onclick="router.navigate('profile')" class="text-[#8E8E93] btn-press"><span class="material-symbols-rounded">arrow_back</span></button>
                            <span class="font-[900] text-[#1D1D1F] text-[18px]">상세 결과 및 해설</span>
                        </div>
                        <div class="one-panel p-8 text-center bg-gradient-to-br from-[#E5F1FF] to-white mb-8">
                            <p class="text-[#007AFF] font-[900] text-[11px] uppercase tracking-widest mb-2">${res.examTitle || '시험 결과'}</p>
                            <h2 class="text-[64px] font-[900] text-[#007AFF] leading-none mb-2">${res.score}<span class="text-[20px]">점</span></h2>
                            <p class="text-[#8E8E93] text-[12px] font-[800]">${res.timestamp?.toDate().toLocaleString() || '최근'}</p>
                        </div>
                        <div class="space-y-6">
                            ${qs.map((q, i) => {
                                const userAns = res.answers[i];
                                const correctAns = Number(q.answer);
                                const isCorrect = userAns !== undefined && Number(userAns) === correctAns;
                                
                                return `
                                <div class="one-panel p-6 border-l-[6px] ${isCorrect ? 'border-[#34C759]' : 'border-[#FF3B30]'}">
                                    <div class="flex gap-3 items-start mb-4">
                                        <span class="text-[14px] font-[900] ${isCorrect ? 'text-[#34C759]' : 'text-[#FF3B30]'}">Q${i+1}</span>
                                        <p class="font-[800] text-[16px] text-[#1D1D1F] leading-snug">${q.question}</p>
                                    </div>
                                    <div class="one-item p-5 text-[14px] leading-relaxed text-[#5C5C5C]">
                                        <div class="flex items-center gap-2 mb-2">
                                            <span class="material-symbols-rounded text-[20px] ${isCorrect ? 'text-[#34C759]' : 'text-[#FF3B30]'}">${isCorrect ? 'check_circle' : 'cancel'}</span>
                                            <p class="font-[800]">내 선택: ${userAns !== undefined && q.options[userAns] ? q.options[userAns] : '미선택'}</p>
                                        </div>
                                        ${!isCorrect ? `<p class="mb-4 text-[#8E8E93] font-[600]">정답: <span class="text-[#1D1D1F] font-[900] underline decoration-[#007AFF]/30 decoration-4 underline-offset-4">${q.options[correctAns] || '데이터 없음'}</span></p>` : ''}
                                        
                                        <hr class="my-4 border-[#E5E5EA]">
                                        
                                        <div class="flex flex-col gap-2">
                                            <span class="text-[12px] font-[900] text-[#007AFF] shrink-0">📝 전체 해설 (답지)</span>
                                            <div class="text-[13px] text-[#5C5C5C] break-keep leading-relaxed space-y-2 bg-white p-4 rounded-[16px] border border-[#E5E5EA]">
                                                ${Array.isArray(q.explanations)
                                                    ? q.explanations.map((exp, idx) => `
                                                        <p class="${idx === correctAns ? 'text-[#007AFF] font-[800] bg-[#E5F1FF] p-2 rounded-[12px]' : 'font-[600] p-1'}">
                                                            [${idx + 1}번] ${exp}
                                                        </p>
                                                    `).join('')
                                                    : `<p class="font-[600]">${q.explanations || '등록된 해설이 없습니다.'}</p>`
                                                }
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                        <button onclick="router.navigate('profile')" class="w-full bg-[#1D1D1F] text-white py-5 rounded-[32px] font-[900] text-[17px] shadow-xl btn-press mt-8">닫기 (기록실로 이동)</button>
                    `;
                } else if (window.state.currentView === 'profile') {
                    const myResults = window.state.results
                        .filter(r => r.studentId === window.state.studentId)
                        .sort((a,b) => {
                            if(!a.timestamp) return -1;
                            if(!b.timestamp) return 1;
                            return b.timestamp.seconds - a.timestamp.seconds;
                        });
                    const myBest = [...myResults].sort((a,b) => b.score - a.score)[0];

                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-[24px] font-[900]">나의 학습 기록</h2>
                            <button onclick="ui.logout()" class="text-[#FF3B30] font-[800] text-[12px] bg-[#FF3B30]/10 px-4 py-2 rounded-full btn-press">로그아웃</button>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="one-panel p-6 bg-[#007AFF] text-white">
                                <p class="text-[11px] font-[800] text-blue-200 uppercase mb-1">최고 달성 점수</p>
                                <p class="text-[32px] font-[900]">${myBest ? myBest.score : '0'}<span class="text-[16px] ml-1 text-blue-200">점</span></p>
                            </div>
                            <div class="one-panel p-6">
                                <p class="text-[11px] font-[800] text-[#8E8E93] uppercase mb-1">누적 응시 횟수</p>
                                <p class="text-[32px] font-[900] text-[#1D1D1F]">${myResults.length}<span class="text-[16px] ml-1 text-[#8E8E93]">회</span></p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h3 class="text-[14px] font-[900] text-[#8E8E93] px-2 mb-2">과거 응시 내역</h3>
                            ${myResults.length === 0 ? `
                                <div class="one-item py-16 text-center border-2 border-dashed border-[#E5E5EA]">
                                    <span class="material-symbols-rounded text-[#C7C7CC] text-[48px] mb-2">history</span>
                                    <p class="text-[#8E8E93] text-[14px] font-[800]">아직 응시한 기록이 없습니다.</p>
                                </div>
                            ` : myResults.map((r, i) => `
                                <button onclick="ui.viewPastResult('${r.id}')" class="w-full one-panel p-6 flex justify-between items-center btn-press text-left border-2 border-transparent active:border-[#007AFF]/20">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-[16px] bg-[#E5F1FF] flex flex-col items-center justify-center text-[#007AFF]">
                                            <span class="text-[9px] font-[900] uppercase leading-none mb-1">SCORE</span>
                                            <span class="font-[900] text-[16px] leading-none">${r.score}</span>
                                        </div>
                                        <div>
                                            <p class="font-[900] text-[16px] text-[#1D1D1F] leading-tight">${r.examTitle || '이전 모의고사'}</p>
                                            <p class="text-[11px] text-[#8E8E93] font-[800] uppercase mt-1">${r.timestamp?.toDate().toLocaleString() || '방금 전'}</p>
                                        </div>
                                    </div>
                                    <div class="text-[#C7C7CC]">
                                        <span class="material-symbols-rounded">chevron_right</span>
                                    </div>
                                </button>
                            `).join('')}
                        </div>
                    `;
                } else if (window.state.currentView === 'admin_manage') {
                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-[24px] font-[900]">Admin Console</h2>
                            <button onclick="window.state.isAdmin=false; router.navigate('home')" class="text-[#8E8E93] btn-press"><span class="material-symbols-rounded">logout</span></button>
                        </div>
                        <div class="flex gap-2 p-1.5 one-item mb-8">
                            <button onclick="router.navigate('admin_manage')" class="flex-1 py-3 bg-white rounded-[20px] font-[900] text-[14px] shadow-sm">시험 및 문항</button>
                            <button onclick="router.navigate('admin_results')" class="flex-1 py-3 text-[#8E8E93] font-[800] text-[14px]">전체 성적</button>
                        </div>
                        
                        <div class="one-panel p-8 mb-8 border border-[#E5F1FF]">
                            <h3 class="text-[14px] font-[900] text-[#007AFF] mb-4">새 시험 등록 (JSON)</h3>
                            <input type="text" id="exam-title-input" placeholder="시험 제목 (예: 제 1회 모의고사)" class="w-full one-item p-4 text-[14px] font-[800] outline-none border-2 border-transparent focus:border-[#007AFF] mb-3">
                            <textarea id="json-input" placeholder='[{"question": "...", "options": [...], "answer": 0, "explanations": [...]}]' 
                                class="w-full h-32 one-item p-4 text-[12px] font-mono outline-none border-2 border-transparent focus:border-[#007AFF] mb-4"></textarea>
                            <button onclick="ui.addExam()" class="w-full bg-[#007AFF] text-white py-4 rounded-full font-[900] text-[15px] shadow-lg btn-press">시험 생성하기</button>
                        </div>

                        <div class="space-y-4">
                            <h3 class="text-[14px] font-[900] text-[#8E8E93] px-2 mb-2">등록된 시험 목록 (${window.state.exams.length})</h3>
                            ${window.state.exams.length === 0 ? '<div class="one-panel py-10 text-center text-[#8E8E93] font-[800]">등록된 시험이 없습니다.</div>' : ''}
                            ${window.state.exams.map(exam => `
                                <div class="one-panel p-6">
                                    <div class="flex justify-between items-center mb-4 pb-4 border-b border-[#E5E5EA]">
                                        <div>
                                            <h3 class="font-[900] text-[#1D1D1F] text-[18px]">${exam.title}</h3>
                                            <p class="text-[12px] text-[#8E8E93] font-[800] mt-1">총 ${exam.questions.length}문항</p>
                                        </div>
                                        <button onclick="ui.deleteExam('${exam.id}')" class="text-[#FF3B30] bg-[#FF3B30]/10 p-2 rounded-full btn-press"><span class="material-symbols-rounded">delete</span></button>
                                    </div>
                                    <div class="space-y-3">
                                        ${exam.questions.map((q, idx) => `
                                            <div class="one-item p-4 flex justify-between items-center gap-3">
                                                <span class="text-[12px] font-[900] text-[#007AFF]">#${idx+1}</span>
                                                <div class="flex-1 truncate">
                                                    <span class="text-[10px] font-[900] text-white bg-[#007AFF] px-2 py-0.5 rounded mr-2">정답: ${Number(q.answer) + 1}번</span>
                                                    <span class="text-[14px] font-[600] text-[#5C5C5C]">${q.question}</span>
                                                </div>
                                                <button onclick="ui.openEditModal('${exam.id}', ${idx})" class="text-[#007AFF] bg-[#E5F1FF] p-2 rounded-xl btn-press"><span class="material-symbols-rounded text-[18px]">edit</span></button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (window.state.currentView === 'admin_results') {
                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-[24px] font-[900]">전체 응시 데이터</h2>
                            <button onclick="window.state.isAdmin=false; router.navigate('home')" class="text-[#8E8E93] btn-press"><span class="material-symbols-rounded">logout</span></button>
                        </div>
                        <div class="flex gap-2 p-1.5 one-item mb-8">
                            <button onclick="router.navigate('admin_manage')" class="flex-1 py-3 text-[#8E8E93] font-[800] text-[14px]">시험 및 문항</button>
                            <button onclick="router.navigate('admin_results')" class="flex-1 py-3 bg-white rounded-[20px] font-[900] text-[14px] shadow-sm">전체 성적</button>
                        </div>
                        <div class="space-y-4">
                            ${window.state.results.length === 0 ? '<div class="one-panel py-10 text-center text-[#8E8E93] font-[800]">기록이 없습니다.</div>' : ''}
                            ${window.state.results.sort((a,b) => {
                                if(!a.timestamp) return -1;
                                if(!b.timestamp) return 1;
                                return b.timestamp.seconds - a.timestamp.seconds;
                            }).map(r => `
                                <div class="one-panel p-6 flex justify-between items-center">
                                    <div class="flex gap-4 items-center">
                                        <div class="w-14 h-14 one-item flex items-center justify-center font-[900] text-[18px] text-[#007AFF]">${r.studentId.substring(0,2)}</div>
                                        <div>
                                            <p class="font-[900] text-[#1D1D1F] text-[18px]">${r.studentId}</p>
                                            <p class="text-[12px] text-[#5C5C5C] font-[800] mb-0.5 truncate max-w-[150px]">${r.examTitle || '이전 모의고사'}</p>
                                            <p class="text-[10px] text-[#8E8E93] font-[800] uppercase tracking-widest">${r.timestamp?.toDate().toLocaleString() || 'Syncing...'}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[28px] font-[900] ${r.score >= 80 ? 'text-[#007AFF]' : 'text-[#1D1D1F]'}">${r.score}<span class="text-[14px]">점</span></p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (window.state.currentView === 'quiz') {
                    content.innerHTML = `
                        <h2 class="text-[24px] font-[900] mb-6">시험 센터</h2>
                        <div class="space-y-6">
                            ${window.state.exams.length === 0 ? `
                                <div class="one-panel py-16 text-center">
                                    <p class="text-[#8E8E93] font-[800]">현재 진행 중인 시험이 없습니다.</p>
                                </div>
                            ` : window.state.exams.map(exam => `
                                <div class="one-panel p-8">
                                    <div class="flex justify-between items-start mb-6">
                                        <div>
                                            <span class="inline-block px-3 py-1 bg-[#E5F1FF] text-[#007AFF] text-[11px] font-[900] rounded-full mb-3">ACTIVE</span>
                                            <h3 class="font-[900] text-[#1D1D1F] text-[20px] leading-tight">${exam.title}</h3>
                                        </div>
                                        <div class="w-12 h-12 one-item flex items-center justify-center text-[#007AFF]">
                                            <span class="material-symbols-rounded text-[24px]">description</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4 text-[13px] font-[800] text-[#8E8E93] mb-8">
                                        <span class="flex items-center gap-1"><span class="material-symbols-rounded text-[16px]">format_list_numbered</span> ${exam.questions.length}문항</span>
                                        <span class="flex items-center gap-1"><span class="material-symbols-rounded text-[16px]">schedule</span> 시간 무제한</span>
                                    </div>
                                    <button onclick="ui.startQuiz('${exam.id}')" class="w-full one-item hover:bg-[#E5F1FF] hover:text-[#007AFF] text-[#1D1D1F] py-5 rounded-[32px] font-[900] text-[16px] transition-colors btn-press">
                                        이 시험 응시하기
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            }
        };

        window.router = {
            navigate: (view) => {
                window.state.currentView = view;
                window.scrollTo(0,0);
                ui.render();
            }
        };

        // Scroll listener for floating bar (Duru Style)
        window.onscroll = function() {
            const nav = document.getElementById('nav-container');
            const wrap = document.getElementById('floating-bar');
            const texts = document.querySelectorAll('.nav-text');
            const isScrolled = window.scrollY > 40;

            if (wrap && nav && !wrap.classList.contains('hidden')) {
                if (isScrolled) {
                    wrap.style.width = '240px';
                    nav.style.height = '58px';
                    texts.forEach(t => t.classList.add('hidden-text'));
                } else {
                    wrap.style.width = 'calc(100% - 40px)';
                    nav.style.height = '76px';
                    texts.forEach(t => t.classList.remove('hidden-text'));
                }
            }
        };

        const init = async () => {
            const timeout = setTimeout(() => {
                if(!window.state.isDataLoaded) {
                    ui.hideLoading();
                    ui.showToast("오프라인 상태로 진입합니다.");
                    router.navigate(window.state.isLoggedIn ? 'home' : 'login');
                }
            }, 3000);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (u) => { 
                    if (!u) return;
                    
                    onSnapshot(eCol, (snap) => {
                        window.state.exams = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        window.state.isDataLoaded = true;
                        ui.render();
                        ui.hideLoading();
                        clearTimeout(timeout);
                    }, (err) => {
                        console.error("Exams Fetch Error", err);
                        ui.hideLoading();
                        clearTimeout(timeout);
                    });
                    
                    onSnapshot(rCol, (snap) => {
                        window.state.results = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        ui.render();
                    });
                });
                
                if (!window.state.isLoggedIn) router.navigate('login');
                else router.navigate('home');

            } catch (e) {
                console.error("Init error", e);
                ui.hideLoading();
                clearTimeout(timeout);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
